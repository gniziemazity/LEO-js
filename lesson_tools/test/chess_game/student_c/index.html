            .cell {

            .light {background-color: white;}
            .dark {background-color: grey;}

            #chess-board {
                width: 400px;
                height: 400px;
                display: grid;
                grid-template-rows: repeat(8, 1fr); /*1 fraction*/
                grid-template-columns: repeat(8, 1fr);
            }
            img {
                width: 50%;
            }
            .invert-color {
                filter: invert(100%);
            }
        </style>
    </head>
    <body>
        <h1>Chess Game</h1>
        <div id="chess-board">
            <div class="cell light" onclick="handleClick(this);">
                <img src="pieces/p2.png"/>

        </div>

        <script>
            let selectedPiece = null;
            const cells = document.getElementsByClassName("cell");
            console.log(cells);
            for (const cell of cells) {
                cell.onclick = function () {
                    handleClick(cell);
                };
            }

            function handleClick(element) {
                for (const cell of cells) {
                    cell.style.border = "";
                }
                if (selectedPiece != null) {
                    element.replaceChildren(selectedPiece);
                    selectedPiece = null;
                } else if (element.children.length > 0) {
                    selectedPiece = element.children[0];
                    element.style.border = "4px solid red";
                }
                element.style.border = "4px solid red";
            }
        </script>
    </body>
