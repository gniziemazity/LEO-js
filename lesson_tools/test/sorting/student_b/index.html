<DOCTYPE html>
    <html>
        <head>
            <title >Sorting Visualizer</title>
            <style>
                body {
                    display: flex;
                    align-items:center;
                    flex-direction:column;
                    
                }
                #vis-123456 {
                    width: 200px;
                    height: 200px;
                    background-color: red;
                    display: flex;
                }
                .bar {
                    width: 7px;
                    height: 100%;
                    background-colour:black;
                    margin: 0px 1px;
                }
                </style>

        </head>
        <body>
            <h1>Sorting Visualizer</h1>
            <div id="vis-123456"></div>
            <script>//global variables
                
                const count = 50;
                const array = new Array(count);
                for (let i = 0; i <count; i++) {
                    array[i] =Math.random(); // numbers between 0 and 1
                }
                const visualizer = document.getElementById("vis-123456");
                for (let i = 0; i <array. length; i++) {
                    const bar = document.crateElement("div");
                    visualizer.appendchild(bar);
                    bar.classList.add("bar");
                    bar.style.height = array{i} * 100 + "%"; /* + here is 
                    string concatenation because 
                    the second item "%" is a string */


                

                }
                function bubbleSort(arr) {
                    do {
                        var swapped = false;
                        for (let i = 1; i < arr.length; i++) {
                            if (arr[i-1] > arr[i]) {
                                const aux = arr[i-1];
                                arr[i-1] > arr[i];
                                arr[1] = aux;
                                swapped=true;
                                updateBars();
                                await new promise(resolve => setTimeout(resolve,10));

                                
                            }
                        }
                    }while(swapped);
                }
                </script>
                </body>
                </html>
