<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Lessons</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			#preview-frame {
				flex: 1;
				border: none;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body class="tool-shell">
		<div id="toolbar" class="app-toolbar">
			<span
				style="
					font-size: 11px;
					color: var(--clr-label);
					white-space: nowrap;
					margin-right: 4px;
				"
				>Lesson:</span
			>
			<div id="lesson-tabs" style="display: flex; gap: 4px"></div>
			<div class="sep"></div>
			<button id="timeline-btn" disabled>Open Timeline</button>
			<button id="students-btn" disabled>Show Students</button>
			<button id="assignment-btn" disabled>Open Assignment</button>
			<div class="sep"></div>
			<button id="download-plans-btn">Download Plans</button>
		</div>

		<div id="main">
			<iframe id="preview-frame" style="display: none"></iframe>
			<div id="no-lesson" class="tool-empty-state">Select a lesson</div>
		</div>

		<script src="diff-utils.js"></script>
		<script src="state-overlay.js"></script>
		<script src="lessons.js"></script>
	</body>
</html>
