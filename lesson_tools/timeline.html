<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Timeline</title>
		<link rel="stylesheet" href="shared/shared.css" />
		<link rel="stylesheet" href="timeline/timeline.css" />
		<script>
			if (/[?&](autoload=1|lesson=)/.test(location.search))
				document.documentElement.classList.add("autoload");
		</script>
	</head>
	<body>
		<div id="landing">
			<div id="landing-buttons">
				<button class="landing-btn" onclick="openFilePicker()">
					📄 Open Log File
				</button>
				<button class="landing-btn" onclick="openFolderPicker()">
					📁 Open Folder
				</button>
			</div>
		</div>

		<div id="main">
			<div id="charts">
				<div id="hover-vline"></div>
				<div class="chart-section" id="chart-top-section">
					<div class="chart-wrap"><canvas id="chart-top"></canvas></div>
					<button
						id="btn-open-sim"
						onclick="window.open('simulator.html')"
						title="Simulate Lesson"
					>
						▶
					</button>
					<div id="chart-top-legend" class="chart-legend-overlay">
						<div id="leg-total" class="leg-total-row"></div>
						<label
							><input type="checkbox" id="leg-chars" checked /><span
								class="leg-swatch"
								style="--clr: var(--clr-black)"
							></span
							><span>Chars <span class="leg-count"></span></span
						></label>
						<label
							><input type="checkbox" id="leg-inserts" checked /><span
								class="leg-swatch leg-dia"
							></span
							><span>Inserts <span class="leg-count"></span></span
						></label>
						<label
							><input type="checkbox" id="leg-deletes" checked /><span
								class="leg-swatch"
								style="--clr: var(--clr-red)"
							></span
							><span>Deletes <span class="leg-count"></span></span
						></label>
						<label
							><input type="checkbox" id="leg-dev" checked /><span
								class="leg-swatch"
								style="--clr: var(--clr-purple)"
							></span
							><span>Dev <span class="leg-count"></span></span
						></label>
						<label
							><input type="checkbox" id="leg-anchors" checked /><span
								class="leg-swatch"
								style="--clr: var(--clr-accent)"
							></span
							><span>Anchors <span class="leg-count"></span></span
						></label>
						<label
							><input type="checkbox" id="leg-moves" checked /><span
								class="leg-swatch"
								style="--clr: var(--clr-orange)"
							></span
							><span>Moves <span class="leg-count"></span></span
						></label>
						<label
							><input type="checkbox" id="leg-interactions" /><span
								>Interactions <span class="leg-count"></span></span
						></label>
					</div>
				</div>
				<div class="chart-section" id="chart-middle-section">
					<div class="chart-wrap"><canvas id="chart-middle"></canvas></div>
				</div>
				<div
					class="chart-section"
					id="chart-bottom-section"
					style="display: none"
				>
					<div class="chart-wrap"><canvas id="chart-bottom"></canvas></div>
					<div id="chart-bottom-legend">
						<span id="chart-bottom-basis"></span>
						<label
							><input
								type="checkbox"
								id="leg-bottom-followrank"
								checked
							/><span>Follow Rank</span></label
						>
						<label
							><input
								type="checkbox"
								id="leg-bottom-firstmismatch"
								checked
							/><span>First Mismatch</span></label
						>
						<label
							><input
								type="checkbox"
								id="leg-bottom-interactions"
								checked
							/><span>Interactions</span></label
						>
						<label
							><input
								type="checkbox"
								id="leg-bottom-barmode"
								checked
							/><span>Bars</span></label
						>
						<label
							title="Remove students whose lesson Obs marks them as a copier (contains '<')"
							><input
								type="checkbox"
								id="leg-bottom-hidecopiers"
								checked
							/><span>Hide copiers</span></label
						>
					</div>
					<button
						id="btn-shake"
						onclick="toggleStudentJitter()"
						title="Jitter Students"
					>
						🎲
					</button>
					<button id="btn-students" title="Open Students">👥</button>
				</div>
			</div>
		</div>

		<div id="loading">Loading…</div>
		<div id="tooltip"></div>

		<script src="shared/diff-utils.js"></script>
		<script src="shared/data-source.js"></script>
		<script src="languages/profiles.js"></script>
		<script src="shared/simulator-model.js"></script>
		<script src="shared/simulator-replay.js"></script>
		<script src="shared/timeline-utils.js"></script>
		<script src="timeline/config.js"></script>
		<script src="timeline/data.js"></script>
		<script src="timeline/stats.js"></script>
		<script src="timeline/render.js"></script>
		<script src="timeline/render-main.js"></script>
		<script src="timeline/render-bottom.js"></script>
		<script src="timeline/render-decor.js"></script>
		<script src="timeline/zoom.js"></script>
		<script src="timeline/tooltip.js"></script>
		<script src="timeline/burst-deco.js"></script>
		<script src="timeline/tooltip-hover.js"></script>
		<script src="timeline/tooltip-format.js"></script>
		<script src="timeline/tooltip-formathit.js"></script>
		<script src="timeline/students.js"></script>
		<script src="timeline/diff.js"></script>
		<script src="timeline/index.js"></script>
		<script src="shared/xlsx.full.min.js"></script>
	</body>
</html>
