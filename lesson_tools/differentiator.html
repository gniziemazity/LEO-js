<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Differentiator</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			html,
			body {
				height: 100%;
				overflow: hidden;
				background: #e8e8e8;
			}

			#diff-root {
				display: flex;
				height: 100vh;
				width: 100%;
			}

			.diff-panel {
				display: flex;
				flex-direction: column;
				flex: 1;
				min-width: 0;
				overflow: hidden;
				border-right: 2px solid #ccc;
			}
			.diff-panel:last-child {
				border-right: none;
			}

			.panel-header {
				background: #e8e8e8;
				padding: 4px 10px;
				font-size: 11px;
				font-weight: 700;
				color: #555;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				flex-shrink: 0;
				border-bottom: 1px solid #ccc;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			#data-source-status {
				display: none;
				padding: 1px 6px;
				font-size: 10px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.3px;
				border-radius: 999px;
				border: 1px solid #bbb;
				background: #fff;
				color: #666;
			}

			.panel-landing {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.panel-content {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-height: 0;
				overflow: hidden;
			}

			.tab-bar {
				display: flex;
				flex: 1;
				min-width: 0;
				overflow-x: auto;
				scrollbar-width: none;
			}
			.tab-bar::-webkit-scrollbar {
				display: none;
			}

			.code-wrap {
				flex: 1;
				overflow: hidden;
				position: relative;
			}

			.code-pane {
				display: none;
				height: 100%;
				overflow: auto;
			}
			.code-pane.active {
				display: block;
			}
			.code-pane pre {
				padding: 8px;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				color: #aaa;
				background: #fff;
				white-space: pre-wrap;
				word-wrap: break-word;
				tab-size: 4;
				-moz-tab-size: 4;
				min-height: 100%;
			}

			.code-aligned {
				padding: 8px;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				color: #aaa;
				background: #fff;
				tab-size: 4;
				-moz-tab-size: 4;
				min-height: 100%;
				white-space: pre;
			}
			.diff-line {
				display: block;
				min-height: 1.5em;
				white-space: pre;
			}
			.diff-ghost {
				color: #ccc !important;
				font-style: italic;
				font-weight: normal !important;
				background: rgba(0, 0, 0, 0.02);
			}
			.diff-ghost-nl {
				display: inline-block;
				margin: 0 4px;
				font-weight: 600;
				color: #999;
			}
			.diff-spacer {
				display: block;
				min-height: 1.5em;
				background: rgba(0, 0, 0, 0.04);
			}

			.btn-preview,
			.btn-edit {
				z-index: 100;
				padding: 4px 12px;
				font-size: 11px;
				font-weight: normal;
				text-transform: none;
				letter-spacing: 0;
				border: 1px solid #bbb;
				border-radius: 4px;
				background: #fff;
				color: #555;
				cursor: pointer;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
			}
			.btn-preview:hover,
			.btn-edit:hover {
				background: #e8f4ff;
				border-color: #007acc;
				color: #007acc;
			}
			.btn-preview.active,
			.btn-edit.active {
				background: #007acc;
				color: #fff;
				border-color: #007acc;
			}
			.btn-edit:disabled {
				cursor: default;
			}
			.btn-edit:disabled:hover {
				background: #007acc;
				color: #fff;
				border-color: #007acc;
			}
			.code-aligned[contenteditable="plaintext-only"],
			.code-aligned[contenteditable="true"] {
				outline: none;
				caret-color: #007acc;
				background: #fffbe6;
			}

			#bottom-bar {
				position: fixed;
				bottom: 14px;
				right: 14px;
				z-index: 100;
				display: none;
				gap: 6px;
				align-items: center;
			}

			#mode-select {
				padding: 4px 8px;
				font-size: 11px;
				border: 1px solid #bbb;
				border-radius: 4px;
				background: #fff;
				color: #555;
				cursor: pointer;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
			}

			.preview-frame {
				flex: 1;
				min-height: 0;
				border: none;
				background: #fff;
				display: none;
			}

			.leo-mark {
				cursor: pointer;
			}
			.leo-mark.leo-highlight-active {
				background-color: rgba(255, 220, 0, 0.45);
				outline: 1px solid #c79a00;
				border-radius: 2px;
			}
			.swap-paired {
				cursor: pointer;
				text-decoration: underline dotted #888;
				text-underline-offset: 2px;
			}
			.swap-paired.swap-partner-active {
				background-color: rgba(120, 80, 200, 0.25);
				outline: 1px solid #6a3aa0;
				border-radius: 2px;
			}
			.insert-source {
				cursor: pointer;
				text-decoration: underline dotted #c79a00;
				text-underline-offset: 2px;
			}
			.insert-anchor {
				display: inline-block;
				cursor: pointer;
				color: #c79a00;
				font-size: 9px;
				line-height: 1;
				vertical-align: middle;
				margin: 0 -2px;
				padding: 0;
				user-select: none;
				opacity: 0.7;
			}
			.insert-anchor:hover {
				opacity: 1;
			}
			.insert-anchor.insert-active {
				color: #fff;
				background-color: #c79a00;
				border-radius: 2px;
				opacity: 1;
				padding: 0 2px;
				margin: 0;
			}
			#leo-tooltip {
				position: fixed;
				display: none;
				flex-direction: column;
				z-index: 9999;
				max-width: 95vw;
				max-height: 80vh;
				overflow: hidden;
				background: #fff;
				color: #222;
				border: 1px solid #999;
				border-radius: 4px;
				font-family:
					ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
				font-size: 11px;
				line-height: 1.45;
				box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
			}
			#leo-tooltip-header {
				display: flex;
				align-items: center;
				cursor: move;
				padding: 2px 4px 2px 8px;
				border-bottom: 1px solid #e0e0e0;
				background: #f5f5f5;
				border-radius: 4px 4px 0 0;
				user-select: none;
				flex-shrink: 0;
			}
			#leo-tooltip-drag-hint {
				font-size: 10px;
				color: #bbb;
				margin-right: 6px;
			}
			#leo-tooltip-title {
				flex: 1;
				font-weight: 700;
				font-size: 12px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			#leo-tooltip-close {
				background: none;
				border: none;
				cursor: pointer;
				font-size: 15px;
				color: #999;
				padding: 0 4px;
				line-height: 1;
			}
			#leo-tooltip-close:hover {
				color: #333;
			}
			#leo-tooltip-body {
				overflow: auto;
				padding: 8px 10px;
			}
			#leo-tooltip .leo-sub {
				font-weight: 400;
				color: #666;
				font-size: 11px;
			}
			#leo-tooltip .leo-section-title {
				font-weight: 600;
				color: #555;
				margin-top: 6px;
				border-bottom: 1px dashed #ccc;
			}
			#leo-tooltip .leo-section-title:first-child {
				margin-top: 0;
			}
			#leo-tooltip .leo-row {
				display: flex;
				align-items: baseline;
				gap: 6px;
				white-space: nowrap;
				padding: 1px 2px;
			}
			#leo-tooltip .leo-row.leo-this {
				outline: 2px solid #000;
				box-shadow: inset 4px 0 0 #000;
			}
			#leo-tooltip .leo-pair {
				outline: 1px solid #000;
				margin: 2px 0;
			}
			#leo-tooltip .leo-pair.leo-this {
				outline: 2px solid #000;
				box-shadow: inset 4px 0 0 #000;
			}
			#leo-tooltip .leo-row.leo-row-ghost {
				font-style: italic;
				opacity: 0.85;
			}
			#leo-tooltip .leo-row.leo-row-missing {
				background: rgba(220, 0, 0, 0.08);
			}
			#leo-tooltip .leo-row.leo-row-extra {
				background: rgba(0, 0, 200, 0.08);
			}
			#leo-tooltip .leo-row.leo-row-extra-star {
				background: rgba(58, 160, 224, 0.1);
			}
			#leo-tooltip .leo-row.leo-sep {
				justify-content: center;
				color: #999;
				letter-spacing: 4px;
				padding: 2px 0;
			}
			#leo-tooltip .leo-score {
				flex: 0 0 40px;
				width: 40px;
				text-align: right;
				color: #555;
				font-size: 10.5px;
				font-variant-numeric: tabular-nums;
				padding-right: 4px;
				box-sizing: border-box;
				overflow: hidden;
			}
			#leo-tooltip .leo-before,
			#leo-tooltip .leo-after {
				flex: 1 1 0;
				color: #444;
				overflow: hidden;
				white-space: nowrap;
				min-width: 80px;
			}
			#leo-tooltip .leo-before {
				text-align: right;
				direction: rtl;
				text-overflow: ellipsis;
			}
			#leo-tooltip .leo-before > * {
				direction: ltr;
				unicode-bidi: embed;
			}
			#leo-tooltip .leo-after {
				text-align: left;
				text-overflow: ellipsis;
			}
			#leo-tooltip .leo-center {
				flex: 0 0 auto;
				font-weight: 700;
				padding: 0 4px;
				background: #fff7d6;
				border: 1px solid #d6c477;
				border-radius: 2px;
			}
			#leo-tooltip .leo-ghost-tok {
				color: #aaa;
				font-style: italic;
			}

			/* ===== Generate Truth ===== */
			body.truth-edit-mode #panel-teacher .code-pane.active,
			body.truth-edit-mode #panel-student .code-pane.active {
				outline: 2px dashed #a4c4e2;
				outline-offset: -2px;
			}
			body.truth-pair-mode .code-pane.active,
			body.truth-insert-mode .code-pane.active {
				cursor: crosshair;
			}
			.btn-edit.truth-only-btn,
			#btn-generate-truth {
				background: #d6e7f5;
				border-color: #a4c4e2;
				color: #245481;
			}
			.btn-edit.truth-only-btn:hover,
			#btn-generate-truth:hover {
				background: #c0d7ec;
				border-color: #007acc;
				color: #007acc;
			}

			#truth-controls {
				position: fixed;
				z-index: 9998;
				display: none;
				min-width: 320px;
				max-width: 500px;
				background: #fff;
				border: 1px solid #999;
				border-radius: 6px;
				box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
				padding: 8px 10px;
				font-family: ui-monospace, Consolas, monospace;
				font-size: 12px;
			}
			#truth-controls .tc-title {
				font-weight: 700;
				color: #555;
				margin-bottom: 6px;
				font-size: 11px;
			}
			#truth-controls .tc-row {
				margin: 4px 0;
				display: flex;
				gap: 6px;
				align-items: center;
				flex-wrap: wrap;
			}
			#truth-controls .tc-row.tc-existing {
				font-size: 11px;
				color: #666;
				margin-top: 8px;
				border-top: 1px dashed #ddd;
				padding-top: 6px;
			}
			#truth-controls .tc-mark {
				font-size: 11px;
			}
			#truth-controls .tc-mark-info {
				flex: 1;
				min-width: 0;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			#truth-controls button {
				font-size: 11px;
				padding: 3px 8px;
				border: 1px solid #bbb;
				border-radius: 3px;
				background: #f8f8f8;
				cursor: pointer;
			}
			#truth-controls button:hover {
				background: #e8f4ff;
				border-color: #007acc;
				color: #007acc;
			}
			#truth-controls .tc-btn-add {
				background: #007acc;
				color: #fff;
				border-color: #007acc;
			}
			#truth-controls .tc-btn-add:hover {
				background: #005a9e;
			}
			#truth-controls .tc-btn-del {
				background: #fff5f5;
				border-color: #d99;
				color: #c00;
			}
			#truth-controls .tc-btn-del:hover {
				background: #fee;
			}
			#truth-controls .tc-btn-missing {
				background: #e00;
				color: #fff;
				border-color: #b00;
				font-weight: 700;
			}
			#truth-controls .tc-btn-missing:hover {
				background: #c00;
				color: #fff;
			}
			#truth-controls .tc-btn-extra {
				background: #00c;
				color: #fff;
				border-color: #008;
				font-weight: 700;
			}
			#truth-controls .tc-btn-extra:hover {
				background: #008;
				color: #fff;
			}
			#truth-controls .tc-btn-ghost {
				background: #3aa0e0;
				color: #fff;
				border-color: #2880c0;
				font-weight: 700;
			}
			#truth-controls .tc-btn-ghost:hover {
				background: #2880c0;
				color: #fff;
			}
			#truth-controls .tc-tokens {
				font-size: 11px;
				color: #555;
				margin: 4px 0;
				padding: 4px 6px;
				background: #f5f5f5;
				border-radius: 3px;
			}
			#truth-controls .tc-tokens code {
				color: #222;
			}
			#truth-controls .tc-snap {
				color: #888;
				font-weight: normal;
				font-size: 10.5px;
			}
			#truth-controls .tc-close {
				justify-content: flex-end;
			}
			#truth-controls .tc-existing-info {
				flex: 1;
				color: #666;
				font-size: 11px;
			}

			.truth-float-win#truth-float-win {
				position: fixed;
				display: none;
				flex-direction: column;
				z-index: 9997;
				max-width: 90vw;
				max-height: 80vh;
				background: #fff;
				border: 1px solid #999;
				border-radius: 6px;
				box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
				font-family: ui-monospace, Consolas, monospace;
				font-size: 11px;
				min-width: 360px;
			}
			.truth-float-win .tw-header {
				display: flex;
				align-items: center;
				cursor: move;
				background: #f5f5f5;
				border-bottom: 1px solid #e0e0e0;
				padding: 2px 6px;
				border-radius: 6px 6px 0 0;
				user-select: none;
			}
			.truth-float-win .tw-drag {
				color: #bbb;
				margin-right: 6px;
				font-size: 11px;
			}
			.truth-float-win .tw-title {
				flex: 1;
				font-weight: 700;
			}
			.truth-float-win .tw-close {
				background: none;
				border: none;
				cursor: pointer;
				font-size: 15px;
				color: #999;
			}
			.truth-float-win .tw-close:hover {
				color: #333;
			}
			.truth-float-win .tw-body {
				overflow: auto;
				padding: 8px 10px;
			}
			.truth-float-win .tw-section-title {
				font-weight: 700;
				color: #555;
				margin: 6px 0 2px;
			}
			.truth-float-win .tw-pre {
				background: #fafafa;
				border: 1px solid #eee;
				padding: 6px;
				white-space: pre;
				word-wrap: normal;
				overflow-x: auto;
				font-family: ui-monospace, Consolas, monospace;
				font-size: 11px;
				tab-size: 4;
				-moz-tab-size: 4;
			}
			.truth-float-win .tw-summary-row {
				padding: 6px 0;
				border-bottom: 1px dashed #eee;
			}
			.truth-float-win .tw-summary-head {
				font-size: 11px;
				color: #555;
				margin-bottom: 2px;
			}
			.truth-float-win .tw-summary-suffix {
				color: #666;
				margin-left: 6px;
			}
			.truth-float-win .tw-summary-pre {
				background: #fafafa;
				border: 1px solid #eee;
				padding: 4px 6px;
				margin: 2px 0;
				white-space: pre;
				word-wrap: normal;
				overflow-x: auto;
				font-size: 11px;
			}
			.truth-float-win .tw-summary-pair {
				margin-top: 4px;
				padding-left: 12px;
				border-left: 2px solid #ddd;
			}
			.truth-float-win .tw-summary-arrow {
				font-size: 10.5px;
				color: #666;
			}

			.truth-float-win .tw-preview-split {
				display: flex;
				gap: 8px;
				min-width: 720px;
				width: 80vw;
				max-width: 1400px;
				min-height: 360px;
				max-height: 70vh;
			}
			.truth-float-win .tw-preview-code,
			.truth-float-win .tw-preview-render {
				flex: 1 1 50%;
				min-width: 0;
				display: flex;
				flex-direction: column;
				border: 1px solid #ddd;
				border-radius: 4px;
				background: #fff;
				overflow: hidden;
			}
			.truth-float-win .tw-preview-code {
				overflow: auto;
				padding: 4px 6px;
			}
			.truth-float-win .tw-preview-iframe {
				flex: 1;
				width: 100%;
				border: none;
				background: #fff;
			}
		</style>
	</head>
	<body>
		<div id="bottom-bar">
			<select id="mode-select"></select>
			<button id="btn-preview" class="btn-preview" onclick="togglePreview()">
				⬜ Preview
			</button>
		</div>
		<div id="diff-root">
			<div class="diff-panel" id="panel-teacher">
				<div class="panel-header">
					<span id="title-teacher">Teacher</span>
					<div class="tab-bar" id="tabs-teacher"></div>
				</div>
				<div class="panel-landing" id="landing-teacher">
					<button
						class="landing-btn"
						onclick="document.getElementById('input-teacher').click()"
					>
						📁 Select Teacher Files
					</button>
					<input
						type="file"
						id="input-teacher"
						multiple
						accept=".html,.css,.js,.json"
						style="display: none"
					/>
				</div>
				<div
					class="panel-content"
					id="content-teacher"
					style="display: none"
				>
					<div class="code-wrap" id="code-teacher"></div>
					<iframe
						class="preview-frame"
						id="preview-teacher"
						sandbox="allow-scripts allow-same-origin"
					></iframe>
				</div>
			</div>
			<div class="diff-panel" id="panel-student">
				<div class="panel-header">
					<span id="title-student">Student</span>
					<span id="data-source-status"></span>
					<div class="tab-bar" id="tabs-student"></div>
				</div>
				<div class="panel-landing" id="landing-student">
					<button
						class="landing-btn"
						onclick="document.getElementById('input-student').click()"
					>
						📁 Select Student Files
					</button>
					<input
						type="file"
						id="input-student"
						multiple
						accept=".html,.css,.js,.json"
						style="display: none"
					/>
				</div>
				<div
					class="panel-content"
					id="content-student"
					style="display: none"
				>
					<div class="code-wrap" id="code-student"></div>
					<iframe
						class="preview-frame"
						id="preview-student"
						sandbox="allow-scripts allow-same-origin"
					></iframe>
				</div>
			</div>
		</div>
		<script src="preview.js"></script>
		<script src="differentiator.js"></script>
		<script src="differentiator-truth.js"></script>
	</body>
</html>
