<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Differentiator</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			html,
			body {
				height: 100%;
				overflow: hidden;
			}

			#diff-root {
				height: 100vh;
				width: 100%;
				position: relative;
			}

			#diff-scroll {
				height: 100%;
				overflow-y: auto;
				overflow-x: hidden;
				display: grid;
				grid-template-columns: 1fr 2px 1fr;
				grid-template-rows: auto 1fr;
			}

			#diff-divider {
				grid-column: 2;
				grid-row: 1 / -1;
				background: var(--clr-border);
				pointer-events: none;
				z-index: 5;
			}

			#header-teacher,
			#header-student {
				position: sticky;
				top: 0;
				z-index: 10000;
				grid-row: 1;
			}
			#header-teacher {
				grid-column: 1;
			}
			#header-student {
				grid-column: 3;
			}

			#panel-teacher {
				grid-column: 1;
				grid-row: 2;
			}
			#panel-student {
				grid-column: 3;
				grid-row: 2;
			}

			.diff-panel {
				display: flex;
				flex-direction: column;
				min-width: 0;
				min-height: 0;
			}

			.panel-header {
				background: var(--clr-toolbar);
				padding: 4px 10px;
				font-size: 11px;
				font-weight: 700;
				color: var(--clr-label);
				text-transform: uppercase;
				letter-spacing: 0.6px;
				border-bottom: 1px solid var(--clr-border);
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.panel-landing {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 200px;
			}

			.panel-content {
				flex: 1;
				display: flex;
				flex-direction: column;
			}

			.tab-bar {
				display: flex;
				flex: 1;
				min-width: 0;
				overflow-x: auto;
				scrollbar-width: none;
			}
			.tab-bar::-webkit-scrollbar {
				display: none;
			}

			.code-wrap {
				flex: 1;
				position: relative;
			}

			.code-pane {
				display: none;
				background: var(--clr-bg);
			}
			.code-pane.active {
				display: block;
			}
			.code-pane pre {
				padding: 8px;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				color: var(--clr-code-muted);
				white-space: pre-wrap;
				word-wrap: break-word;
				tab-size: 4;
				-moz-tab-size: 4;
				min-height: 100%;
			}

			.code-aligned {
				padding: 8px;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				color: var(--clr-code-muted);
				tab-size: 4;
				-moz-tab-size: 4;
				min-height: 100%;
				white-space: pre;
			}
			.diff-line {
				display: block;
				min-height: 1.5em;
				white-space: pre;
			}
			.diff-ghost {
				color: var(--clr-border) !important;
				font-style: italic;
				font-weight: normal !important;
				background: rgba(0, 0, 0, 0.02);
			}
			.diff-ghost .leo-mark[data-leo-ghost-offset].truth-ghost-paired {
				font-weight: bold !important;
				text-decoration: underline dotted var(--clr-mark-ghost);
				text-decoration-thickness: 2px;
				text-underline-offset: 2px;
			}
			.leo-mark.truth-paired-ghost-extra {
				text-decoration: underline dotted var(--clr-pale-red);
				text-decoration-thickness: 2px;
				text-underline-offset: 2px;
			}
			.diff-ghost-nl {
				display: inline-block;
				margin: 0 4px;
				font-weight: 600;
				color: var(--clr-text-faint);
			}
			.diff-spacer {
				display: block;
				min-height: 1.5em;
				background: rgba(0, 0, 0, 0.04);
			}

			/* Action button used in #bottom-bar (preview / make-corrections /
			   download / etc.) — also styled by truth-only variants further down. */
			.btn-edit {
				z-index: 100;
				padding: 4px 12px;
				font-size: 11px;
				font-weight: normal;
				text-transform: none;
				letter-spacing: 0;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 4px;
				background: var(--clr-bg);
				color: var(--clr-label);
				cursor: pointer;
				box-shadow: var(--shadow-soft);
			}
			.btn-edit:hover {
				background: var(--clr-accent-light);
				border-color: var(--clr-accent);
				color: var(--clr-accent);
			}
			.btn-edit:disabled {
				cursor: default;
			}
			.btn-edit:disabled:hover {
				background: var(--clr-accent);
				color: var(--clr-bg);
				border-color: var(--clr-accent);
			}
			.code-aligned[contenteditable="plaintext-only"],
			.code-aligned[contenteditable="true"] {
				outline: none;
				caret-color: var(--clr-accent);
				background: var(--clr-highlight-warm);
			}

			#bottom-bar {
				position: fixed;
				bottom: 14px;
				right: 14px;
				z-index: 9997;
				display: none;
				gap: 6px;
				align-items: center;
			}

			#mode-select {
				padding: 4px 8px;
				font-size: 11px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 4px;
				background: var(--clr-bg);
				color: var(--clr-label);
				cursor: pointer;
				box-shadow: var(--shadow-soft);
			}
			#mode-select.is-curated {
				color: var(--clr-mark-extra);
			}
			#mode-select option {
				color: var(--clr-label);
			}
			#mode-select option[value="ideal"],
			#mode-select option[value="required"] {
				color: var(--clr-mark-extra);
			}

			.preview-frame {
				flex: 1;
				min-height: 600px;
				border: none;
				background: var(--clr-bg);
				display: none;
			}

			/* Per-line backgrounds for line-based diff modes. */
			.diff-line--missing {
				background: var(--clr-mark-missing-bg);
			}
			.diff-line--extra {
				background: var(--clr-mark-extra-bg);
			}

			.leo-mark {
				cursor: pointer;
			}
			.leo-mark.leo-highlight-active {
				background-color: var(--clr-highlight-active-bg);
				outline: 1px solid var(--clr-highlight-active);
				border-radius: 2px;
			}
			.leo-mark.leo-highlight-pair-extra {
				background-color: var(--clr-mark-extra-pair-bg);
				outline: 1px solid var(--clr-mark-extra);
			}
			.leo-mark.leo-highlight-pair-missing {
				background-color: var(--clr-mark-missing-pair-bg);
				outline: 1px solid var(--clr-mark-missing);
			}
			.swap-paired {
				cursor: pointer;
				text-underline-offset: 2px;
				text-decoration-thickness: 2px;
			}
			.swap-paired[data-swap-side="student"] {
				text-decoration: underline dotted var(--clr-mark-extra);
				text-decoration-thickness: 2px;
			}
			.swap-paired[data-swap-side="teacher"] {
				text-decoration: underline dotted var(--clr-mark-missing);
				text-decoration-thickness: 2px;
			}
			.insert-source {
				cursor: pointer;
			}
			.insert-anchor {
				display: inline-block;
				cursor: pointer;
				color: var(--clr-mark-missing);
				font-size: 9px;
				line-height: 1;
				vertical-align: text-top;
				margin: 0 -1px;
				padding: 0;
				user-select: none;
				opacity: 0.5;
				transform: translateY(-1px);
			}
			.insert-anchor:hover {
				opacity: 1;
			}
			.insert-anchor.insert-active {
				color: var(--clr-mark-missing);
				opacity: 1;
				font-weight: bold;
				font-size: 13px;
				text-shadow: 0 0 2px var(--clr-mark-missing);
			}

			#leo-tooltip {
				z-index: 9999;
				max-width: 500px;
				max-height: 80vh;
				line-height: 1.45;
			}
			#leo-tooltip .leo-sub {
				font-weight: 400;
				color: var(--clr-label);
				font-size: 11px;
			}
			#leo-tooltip .leo-section-title {
				font-weight: 600;
				color: var(--clr-label);
				margin-top: 6px;
				border-bottom: 1px dashed var(--clr-border);
			}
			#leo-tooltip .leo-section-title:first-child {
				margin-top: 0;
			}
			#leo-tooltip .leo-row {
				display: flex;
				align-items: baseline;
				gap: 6px;
				white-space: nowrap;
				padding: 1px 2px;
			}
			#leo-tooltip .leo-row.leo-this {
				outline: 2px solid var(--clr-black);
				box-shadow: inset 4px 0 0 var(--clr-black);
			}
			#leo-tooltip .leo-pair {
				outline: 1px solid var(--clr-black);
				margin: 2px 0;
			}
			#leo-tooltip .leo-pair.leo-this {
				outline: 2px solid var(--clr-black);
				box-shadow: inset 4px 0 0 var(--clr-black);
			}
			#leo-tooltip .leo-row.leo-row-ghost {
				font-style: italic;
				opacity: 0.85;
			}
			#leo-tooltip .leo-row.leo-row-missing {
				background: var(--clr-mark-missing-soft-bg);
			}
			#leo-tooltip .leo-row.leo-row-extra {
				background: var(--clr-mark-extra-soft-bg);
			}
			#leo-tooltip .leo-row.leo-row-extra-star {
				background: var(--clr-mark-ghost-soft-bg);
			}
			#leo-tooltip .leo-row.leo-sep {
				justify-content: center;
				color: var(--clr-muted);
				letter-spacing: 4px;
				padding: 2px 0;
			}
			#leo-tooltip .leo-score {
				flex: 0 0 40px;
				width: 40px;
				text-align: right;
				color: var(--clr-label);
				font-size: 10.5px;
				font-variant-numeric: tabular-nums;
				padding-right: 4px;
				box-sizing: border-box;
				overflow: hidden;
			}
			#leo-tooltip .leo-before,
			#leo-tooltip .leo-after {
				flex: 1 1 0;
				color: var(--clr-label);
				overflow: hidden;
				white-space: nowrap;
				min-width: 80px;
			}
			#leo-tooltip .leo-before {
				text-align: right;
				direction: rtl;
				text-overflow: ellipsis;
			}
			#leo-tooltip .leo-before > * {
				direction: ltr;
				unicode-bidi: embed;
			}
			#leo-tooltip .leo-after {
				text-align: left;
				text-overflow: ellipsis;
			}
			#leo-tooltip .leo-center {
				flex: 0 0 auto;
				font-weight: 700;
				padding: 0 4px;
				background: var(--clr-highlight-warm-soft);
				border: 1px solid var(--clr-highlight-warm-border);
				border-radius: 2px;
			}
			#leo-tooltip .leo-ghost-tok {
				color: var(--clr-code-muted);
				font-style: italic;
			}

			.code-pane {
				position: relative;
			}
			.code-aligned {
				position: relative;
				z-index: 2;
			}
			.truth-bg-layer {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				pointer-events: none;
				z-index: 1;
			}
			.truth-fg-layer {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				pointer-events: none;
				z-index: 3;
			}
			.truth-bg-rect {
				position: absolute;
				border-radius: 3px;
				box-sizing: border-box;
				pointer-events: none;
			}
			.truth-bg-rect.is-missing {
				background: var(--clr-mark-missing-soft-bg);
				box-shadow: 0 0 6px 2px var(--clr-mark-missing-soft-bg);
			}
			.truth-bg-rect.is-extra {
				background: var(--clr-mark-extra-soft-bg);
				box-shadow: 0 0 6px 2px var(--clr-mark-extra-soft-bg);
			}
			.truth-bg-rect.is-ghost {
				background: var(--clr-mark-ghost-soft-bg);
				box-shadow: 0 0 6px 2px var(--clr-mark-ghost-soft-bg);
			}
			.leo-mark.is-hover-transparent {
				opacity: 0.7;
			}
			.truth-active-rect {
				position: absolute;
				background-color: var(--clr-highlight-active-bg);
				border-radius: 2px;
				box-sizing: border-box;
			}
			.truth-active-rect.is-red {
				background-color: var(--clr-mark-missing-pair-bg);
			}
			.truth-active-rect.is-blue {
				background-color: var(--clr-mark-extra-pair-bg);
			}
			.truth-active-rect.is-gray {
				background-color: rgba(0, 0, 0, 0.1);
			}
			.truth-active-rect.is-dark-gray {
				background-color: rgba(0, 0, 0, 0.28);
			}
			.truth-hover-rect {
				position: absolute;
				background-color: rgba(0, 0, 0, 0.07);
				border-radius: 2px;
				box-sizing: border-box;
				pointer-events: none;
			}
			.leo-mark.truth-sel-red {
				background-color: var(--clr-mark-missing-pair-bg);
				outline: 1px solid var(--clr-mark-missing);
				border-radius: 2px;
			}
			.leo-mark.truth-sel-blue {
				background-color: var(--clr-mark-extra-pair-bg);
				outline: 1px solid var(--clr-mark-extra);
				border-radius: 2px;
			}

			#truth-pair-connector-svg {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				pointer-events: none;
				z-index: 9996;
			}

			.leo-mark.truth-pair-target {
				text-decoration: underline dotted var(--clr-mark-missing);
				text-underline-offset: 2px;
			}
			body.truth-pair-anchor-extra .leo-mark.truth-pair-target {
				text-decoration-color: var(--clr-mark-extra);
			}

			#truth-pair-token-hover {
				position: fixed;
				display: none;
				pointer-events: none;
				z-index: 9998;
				box-sizing: border-box;
				background-color: rgba(0, 0, 0, 0.07);
				border-bottom: 2px dotted var(--clr-mark-missing);
			}
			body.truth-pair-anchor-extra #truth-pair-token-hover {
				border-bottom-color: var(--clr-mark-extra);
			}
			#truth-pair-token-hover.no-underline {
				border-bottom: none;
			}

			#truth-pair-label {
				position: fixed;
				display: none;
				pointer-events: none;
				z-index: 9999;
				font-size: 9px;
				font-weight: 700;
				line-height: 1;
				letter-spacing: 0.5px;
				text-transform: uppercase;
				white-space: nowrap;
				color: var(--clr-black);
				background: rgba(255, 255, 255, 0.8);
				padding: 2px 5px;
				border-radius: 2px;
				box-shadow: var(--shadow-soft);
			}
			#truth-pair-label.is-visible {
				display: block;
			}

			#truth-pair-arrow {
				position: fixed;
				display: none;
				pointer-events: none;
				z-index: 9999;
				color: var(--clr-mark-missing);
				font-size: 14px;
				font-weight: bold;
				line-height: 1;
				transform: translateX(-50%);
				text-shadow: 0 0 2px var(--clr-bg);
			}
			#truth-pair-arrow.is-visible {
				display: block;
			}
			body.truth-pair-anchor-extra #truth-pair-arrow {
				color: var(--clr-mark-extra);
			}

			body.truth-pair-mode,
			body.truth-pair-mode .code-pane,
			body.truth-pair-mode .code-pane *,
			body.truth-pair-mode .leo-mark,
			body.truth-pair-mode .diff-line,
			body.truth-pair-mode .diff-ghost {
				cursor: default !important;
			}
			body.truth-group-hover-active,
			body.truth-group-hover-active .code-pane,
			body.truth-group-hover-active .code-pane *,
			body.truth-group-hover-active .leo-mark,
			body.truth-group-hover-active .diff-line,
			body.truth-token-hover-active,
			body.truth-token-hover-active .code-pane,
			body.truth-token-hover-active .code-pane *,
			body.truth-token-hover-active .leo-mark,
			body.truth-token-hover-active .diff-line {
				cursor: pointer !important;
			}
			.btn-edit.truth-only-btn,
			#btn-generate-truth {
				background: var(--clr-info-pill-bg);
				border-color: var(--clr-info-pill-border);
				color: var(--clr-info-pill-text);
			}
			.btn-edit.truth-only-btn:hover,
			#btn-generate-truth:hover {
				background: var(--clr-info-pill-hover);
				border-color: var(--clr-accent);
				color: var(--clr-accent);
			}

			#truth-controls {
				position: absolute;
				display: none;
				z-index: 9998;
				font-size: 12px;
				background: var(--clr-bg);
				border: 1px solid var(--clr-border);
				border-radius: 4px;
				box-shadow: var(--shadow-soft);
				padding: 3px 4px;
			}
			#truth-controls .tc-row {
				display: flex;
				gap: 6px;
				align-items: center;
				flex-wrap: wrap;
			}
			#truth-controls .tc-row button {
				font-size: 11px;
				padding: 3px 8px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-btn-bg-soft);
				color: var(--clr-text);
				cursor: pointer;
				appearance: none;
				-webkit-appearance: none;
			}
			#truth-controls .tc-row button:hover {
				background: var(--clr-accent-light);
				border-color: var(--clr-accent);
				color: var(--clr-accent);
			}
			#truth-controls .tc-row button.tc-btn-del {
				background: var(--clr-danger-soft-bg);
				border-color: var(--clr-danger-soft-border);
				color: var(--clr-danger);
			}
			#truth-controls .tc-row button.tc-btn-del:hover {
				background: var(--clr-danger-hover-bg);
				color: var(--clr-danger);
			}
			#truth-controls .tc-row button.tc-btn-missing {
				background: var(--clr-mark-missing);
				color: var(--clr-bg);
				border-color: var(--clr-danger-dark);
				font-weight: 700;
			}
			#truth-controls .tc-row button.tc-btn-missing:hover {
				background: var(--clr-danger);
				color: var(--clr-bg);
				border-color: var(--clr-danger-darker);
			}
			#truth-controls .tc-row button.tc-btn-extra {
				background: var(--clr-mark-extra);
				color: var(--clr-bg);
				border-color: var(--clr-extra-dark);
				font-weight: 700;
			}
			#truth-controls .tc-row button.tc-btn-extra:hover {
				background: var(--clr-extra-dark);
				color: var(--clr-bg);
				border-color: var(--clr-extra-darker);
			}
			#truth-controls .tc-row button.tc-btn-ghost {
				background: var(--clr-mark-ghost);
				color: var(--clr-bg);
				border-color: var(--clr-ghost-dark);
				font-weight: 700;
			}
			#truth-controls .tc-row button.tc-btn-ghost:hover {
				background: var(--clr-ghost-dark);
				color: var(--clr-bg);
				border-color: var(--clr-ghost-darker);
			}
			#truth-controls .tc-row button.tc-btn-comment {
				background: var(--clr-mark-comment);
				color: var(--clr-bg);
				border-color: var(--clr-mark-comment);
				font-weight: 700;
			}
			#truth-controls .tc-row button.tc-btn-comment:hover {
				background: var(--clr-mark-comment);
				color: var(--clr-bg);
				filter: brightness(0.85);
			}
			#truth-controls .tc-row button.tc-btn-pair.is-toggle-on {
				color: var(--clr-bg);
				border-color: var(--clr-orange);
				font-weight: 700;
			}
			#truth-controls .tc-tokens {
				font-size: 11px;
				color: var(--clr-label);
				margin-bottom: 6px;
				padding: 4px 6px;
				background: var(--clr-surface);
				border-radius: 3px;
			}
			#truth-controls .tc-tokens code {
				color: var(--clr-gray);
			}

			.truth-float-win#truth-float-win {
				z-index: 10000;
				max-width: 90vw;
				max-height: 80vh;
				min-width: 360px;
			}
			.truth-float-win .tw-section-title {
				font-weight: 700;
				color: var(--clr-label);
				margin: 6px 0 2px;
			}
			.truth-float-win .tw-pre {
				background: var(--clr-surface-soft);
				border: 1px solid var(--clr-border-mid);
				padding: 6px;
				white-space: pre;
				word-wrap: normal;
				overflow-x: auto;
				font-family: ui-monospace, Consolas, monospace;
				font-size: 11px;
				tab-size: 4;
				-moz-tab-size: 4;
			}
			.truth-float-win .tw-summary-row {
				padding: 6px 0;
				border-bottom: 1px dashed var(--clr-border-mid);
			}
			.truth-float-win .tw-summary-head {
				font-size: 11px;
				color: var(--clr-label);
				margin-bottom: 2px;
			}
			.truth-float-win .tw-summary-suffix {
				color: var(--clr-text-dim);
				margin-left: 6px;
			}
			.truth-float-win .tw-summary-pre {
				background: var(--clr-surface-soft);
				border: 1px solid var(--clr-border-mid);
				padding: 4px 6px;
				margin: 2px 0;
				white-space: pre;
				word-wrap: normal;
				overflow-x: auto;
				font-size: 11px;
			}
			.truth-float-win .tw-summary-pair {
				margin-top: 4px;
				padding-left: 12px;
				border-left: 2px solid var(--clr-border);
			}
			.truth-float-win .tw-summary-arrow {
				font-size: 10.5px;
				color: var(--clr-text-dim);
			}

			.truth-float-win .tw-preview-split {
				display: flex;
				gap: 8px;
				min-width: 720px;
				width: 80vw;
				max-width: 1400px;
				min-height: 360px;
				max-height: 70vh;
			}
			.truth-float-win .tw-preview-code,
			.truth-float-win .tw-preview-render {
				flex: 1 1 50%;
				min-width: 0;
				display: flex;
				flex-direction: column;
				border: 1px solid var(--clr-border);
				border-radius: 4px;
				background: var(--clr-bg);
				overflow: hidden;
			}
			.truth-float-win .tw-preview-code {
				overflow: auto;
				padding: 4px 6px;
			}
			.truth-float-win .tw-preview-iframe {
				flex: 1;
				width: 100%;
				border: none;
				background: var(--clr-bg);
			}
		</style>
	</head>
	<body>
		<div id="bottom-bar">
			<select id="mode-select"></select>
			<button
				id="btn-line-padding"
				class="btn-edit"
				onclick="toggleLinePadding()"
			>
				⇲ Padding
			</button>
			<button id="btn-preview" class="btn-edit" onclick="togglePreview()">
				⬜ Preview
			</button>
		</div>
		<div id="diff-root">
			<div id="diff-scroll">
				<div id="diff-divider"></div>
				<div class="panel-header app-toolbar" id="header-teacher">
					<span id="title-teacher">Teacher</span>
					<div class="tab-bar" id="tabs-teacher"></div>
				</div>
				<div class="panel-header app-toolbar" id="header-student">
					<span id="title-student">Student</span>
					<div class="tab-bar" id="tabs-student"></div>
				</div>
				<div class="diff-panel" id="panel-teacher">
					<div class="panel-landing" id="landing-teacher">
						<button
							class="landing-btn"
							onclick="document.getElementById('input-teacher').click()"
						>
							📁 Select Teacher Files
						</button>
						<input
							type="file"
							id="input-teacher"
							multiple
							accept=".html,.css,.js,.py,.json"
							style="display: none"
						/>
					</div>
					<div
						class="panel-content"
						id="content-teacher"
						style="display: none"
					>
						<div class="code-wrap" id="code-teacher"></div>
						<iframe
							class="preview-frame"
							id="preview-teacher"
							sandbox="allow-scripts allow-same-origin"
						></iframe>
					</div>
				</div>
				<div class="diff-panel" id="panel-student">
					<div class="panel-landing" id="landing-student">
						<button
							class="landing-btn"
							onclick="document.getElementById('input-student').click()"
						>
							📁 Select Student Files
						</button>
						<input
							type="file"
							id="input-student"
							multiple
							accept=".html,.css,.js,.py,.json"
							style="display: none"
						/>
					</div>
					<div
						class="panel-content"
						id="content-student"
						style="display: none"
					>
						<div class="code-wrap" id="code-student"></div>
						<iframe
							class="preview-frame"
							id="preview-student"
							sandbox="allow-scripts allow-same-origin"
						></iframe>
					</div>
				</div>
			</div>
		</div>
		<div id="loading">Loading…</div>
		<script src="preview.js"></script>
		<script src="diff-utils.js"></script>
		<script src="languages/profiles.js"></script>
		<script src="differentiator.js"></script>
		<script src="differentiator-render.js"></script>
		<script src="differentiator-leo.js"></script>
		<script src="differentiator-truth.js"></script>
		<script src="differentiator-truth-overlays.js"></script>
		<script src="differentiator-truth-pair.js"></script>
		<script src="differentiator-truth-controls.js"></script>
		<script src="differentiator-truth-io.js"></script>
	</body>
</html>
