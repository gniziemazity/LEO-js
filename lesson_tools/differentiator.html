<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Differentiator</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			html,
			body {
				height: 100%;
				overflow: hidden;
				background: #e8e8e8;
			}

			#diff-root {
				display: flex;
				height: 100vh;
				width: 100%;
			}

			.diff-panel {
				display: flex;
				flex-direction: column;
				flex: 1;
				min-width: 0;
				overflow: hidden;
				border-right: 2px solid #ccc;
			}
			.diff-panel:last-child {
				border-right: none;
			}

			.panel-header {
				background: #e8e8e8;
				padding: 4px 10px;
				font-size: 11px;
				font-weight: 700;
				color: #555;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				flex-shrink: 0;
				border-bottom: 1px solid #ccc;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.panel-landing {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.panel-content {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-height: 0;
				overflow: hidden;
			}

			.tab-bar {
				display: flex;
				flex: 1;
				min-width: 0;
				overflow-x: auto;
				scrollbar-width: none;
			}
			.tab-bar::-webkit-scrollbar {
				display: none;
			}

			.code-wrap {
				flex: 1;
				overflow: hidden;
				position: relative;
			}

			.code-pane {
				display: none;
				height: 100%;
				overflow: auto;
			}
			.code-pane.active {
				display: block;
			}
			.code-pane pre {
				padding: 8px;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				color: #aaa;
				background: #fff;
				white-space: pre-wrap;
				word-wrap: break-word;
				tab-size: 4;
				-moz-tab-size: 4;
				min-height: 100%;
			}

			.code-aligned {
				padding: 8px;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				color: #aaa;
				background: #fff;
				tab-size: 4;
				-moz-tab-size: 4;
				min-height: 100%;
				white-space: pre;
			}
			.diff-line {
				display: block;
				min-height: 1.5em;
				white-space: pre;
			}
			.diff-ghost {
				color: #ccc !important;
				font-style: italic;
				font-weight: normal !important;
				background: rgba(0, 0, 0, 0.02);
			}
			.diff-spacer {
				display: block;
				min-height: 1.5em;
				background: rgba(0, 0, 0, 0.04);
			}

			.btn-preview,
			.btn-edit {
				z-index: 100;
				padding: 4px 12px;
				font-size: 11px;
				font-weight: normal;
				text-transform: none;
				letter-spacing: 0;
				border: 1px solid #bbb;
				border-radius: 4px;
				background: #fff;
				color: #555;
				cursor: pointer;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
			}
			.btn-preview:hover,
			.btn-edit:hover {
				background: #e8f4ff;
				border-color: #007acc;
				color: #007acc;
			}
			.btn-preview.active,
			.btn-edit.active {
				background: #007acc;
				color: #fff;
				border-color: #007acc;
			}
			.code-aligned[contenteditable] {
				outline: none;
				caret-color: #007acc;
			}
			.code-aligned[contenteditable]:focus {
				background: #fffefa;
			}

			#bottom-bar {
				position: fixed;
				bottom: 14px;
				right: 14px;
				z-index: 100;
				display: none;
				gap: 6px;
				align-items: center;
			}

			#mode-select {
				padding: 4px 8px;
				font-size: 11px;
				border: 1px solid #bbb;
				border-radius: 4px;
				background: #fff;
				color: #555;
				cursor: pointer;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
			}

			.preview-frame {
				flex: 1;
				min-height: 0;
				border: none;
				background: #fff;
				display: none;
			}

			.leo-mark {
				cursor: pointer;
				user-select: none;
			}
			.leo-mark.leo-highlight-active {
				background-color: rgba(255, 220, 0, 0.45);
				outline: 1px solid #c79a00;
				border-radius: 2px;
			}
			#leo-tooltip {
				position: fixed;
				display: none;
				z-index: 9999;
				max-width: 95vw;
				max-height: 80vh;
				overflow: auto;
				background: #fffef0;
				color: #222;
				border: 1px solid #999;
				border-radius: 4px;
				padding: 8px 10px;
				font-family:
					ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
				font-size: 11px;
				line-height: 1.45;
				box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
			}
			#leo-tooltip .leo-title {
				font-weight: 700;
				font-size: 13px;
				margin-bottom: 4px;
			}
			#leo-tooltip .leo-sub {
				font-weight: 400;
				color: #666;
				font-size: 11px;
			}
			#leo-tooltip .leo-section-title {
				font-weight: 600;
				color: #555;
				margin-top: 6px;
				border-bottom: 1px dashed #ccc;
			}
			#leo-tooltip .leo-row {
				display: flex;
				align-items: baseline;
				gap: 6px;
				white-space: nowrap;
				padding: 1px 2px;
			}
			#leo-tooltip .leo-row.leo-this {
				background: #ffe9b3;
				outline: 1px solid #c79a00;
			}
			#leo-tooltip .leo-row.leo-row-ghost {
				font-style: italic;
				opacity: 0.85;
			}
			#leo-tooltip .leo-row.leo-row-missing {
				background: rgba(220, 0, 0, 0.08);
				border-left: 3px solid #e00;
				padding-left: 4px;
			}
			#leo-tooltip .leo-row.leo-row-extra {
				background: rgba(0, 0, 200, 0.08);
				border-left: 3px solid #00c;
				padding-left: 4px;
			}
			#leo-tooltip .leo-row.leo-row-extra-star {
				background: rgba(58, 160, 224, 0.1);
				border-left: 3px solid #3aa0e0;
				padding-left: 4px;
			}
			#leo-tooltip .leo-row.leo-sep {
				justify-content: center;
				color: #999;
				letter-spacing: 4px;
				padding: 2px 0;
			}
			#leo-tooltip .leo-score {
				flex: 0 0 40px;
				width: 40px;
				text-align: right;
				color: #555;
				font-size: 10.5px;
				font-variant-numeric: tabular-nums;
				padding-right: 4px;
				box-sizing: border-box;
				overflow: hidden;
			}
			#leo-tooltip .leo-before,
			#leo-tooltip .leo-after {
				flex: 1 1 0;
				color: #444;
				overflow: hidden;
				white-space: nowrap;
				min-width: 0;
			}
			#leo-tooltip .leo-before {
				text-align: right;
				mask-image: linear-gradient(to right, transparent 0, black 24px);
				-webkit-mask-image: linear-gradient(
					to right,
					transparent 0,
					black 24px
				);
			}
			#leo-tooltip .leo-after {
				text-align: left;
				mask-image: linear-gradient(to left, transparent 0, black 24px);
				-webkit-mask-image: linear-gradient(
					to left,
					transparent 0,
					black 24px
				);
			}
			#leo-tooltip .leo-center {
				flex: 0 0 auto;
				font-weight: 700;
				padding: 0 4px;
				background: #fff7d6;
				border: 1px solid #d6c477;
				border-radius: 2px;
			}
			#leo-tooltip .leo-ghost-tok {
				color: #aaa;
				font-style: italic;
			}
		</style>
	</head>
	<body>
		<div id="bottom-bar">
			<select id="mode-select">
				<option value="">LEO*</option>
				<option value="leo">LEO</option>
				<option value="token-lcs">LCS</option>
				<option value="token-lcs-star">LCS*</option>
				<option value="token-lev">Lev</option>
				<option value="token-lev-star">Lev*</option>
				<option value="line-ro">R/O</option>
				<option value="line-ro-star">R/O*</option>
				<option value="line-git">Git</option>
				<option value="line-git-star">Git*</option>
			</select>
			<button id="btn-preview" class="btn-preview" onclick="togglePreview()">
				⬜ Preview
			</button>
			<button id="btn-edit" class="btn-edit" onclick="toggleEditMode()">
				✏️ Edit
			</button>
		</div>
		<div id="diff-root">
			<div class="diff-panel" id="panel-teacher">
				<div class="panel-header">
					<span id="title-teacher">Teacher</span>
					<div class="tab-bar" id="tabs-teacher"></div>
				</div>
				<div class="panel-landing" id="landing-teacher">
					<button
						class="landing-btn"
						onclick="document.getElementById('input-teacher').click()"
					>
						📁 Select Teacher Files
					</button>
					<input
						type="file"
						id="input-teacher"
						multiple
						accept=".html,.css,.js,.json"
						style="display: none"
					/>
				</div>
				<div
					class="panel-content"
					id="content-teacher"
					style="display: none"
				>
					<div class="code-wrap" id="code-teacher"></div>
					<iframe
						class="preview-frame"
						id="preview-teacher"
						sandbox="allow-scripts allow-same-origin"
					></iframe>
				</div>
			</div>
			<div class="diff-panel" id="panel-student">
				<div class="panel-header">
					<span id="title-student">Student</span>
					<div class="tab-bar" id="tabs-student"></div>
				</div>
				<div class="panel-landing" id="landing-student">
					<button
						class="landing-btn"
						onclick="document.getElementById('input-student').click()"
					>
						📁 Select Student Files
					</button>
					<input
						type="file"
						id="input-student"
						multiple
						accept=".html,.css,.js,.json"
						style="display: none"
					/>
				</div>
				<div
					class="panel-content"
					id="content-student"
					style="display: none"
				>
					<div class="code-wrap" id="code-student"></div>
					<iframe
						class="preview-frame"
						id="preview-student"
						sandbox="allow-scripts allow-same-origin"
					></iframe>
				</div>
			</div>
		</div>
		<script src="preview.js"></script>
		<script src="differentiator.js"></script>
	</body>
</html>
