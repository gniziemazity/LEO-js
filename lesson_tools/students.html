<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Students</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			body {
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
				background: var(--clr-page);
			}

			#landing {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				flex: 1;
				gap: 24px;
				user-select: none;
			}

			#landing-buttons {
				display: flex;
				gap: 16px;
			}

			#toolbar {
				gap: 12px;
			}

			#lesson-name {
				font-weight: bold;
				color: var(--clr-text);
				margin-right: 8px;
			}

			#lesson-name.clickable {
				cursor: pointer;
			}

			#lesson-name.clickable:hover {
				color: var(--clr-accent);
				text-decoration: underline;
			}

			#toolbar label {
				display: flex;
				align-items: center;
				gap: 6px;
				color: var(--clr-label);
			}

			#toolbar select {
				font-size: 11px;
				padding: 1px 6px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
			}

			#toolbar select.is-curated {
				color: var(--clr-mark-extra);
			}

			#toolbar select option[value="ideal"],
			#toolbar select option[value="required"] {
				color: var(--clr-mark-extra);
			}

			#main {
				display: none;
				flex-direction: column;
				flex: 1;
				min-height: 0;
				overflow: hidden;
			}

			#table-wrap {
				flex: 1;
				overflow-x: hidden;
				overflow-y: auto;
				background: var(--clr-bg);
			}

			table {
				width: 100%;
				min-width: 100%;
				border-collapse: collapse;
				font-size: 12px;
			}

			thead th {
				background: var(--clr-surface);
				border-bottom: 2px solid var(--clr-border);
				border-right: 1px solid var(--clr-border);
				padding: 5px 8px;
				text-align: left;
				font-size: 11px !important;
				font-family: inherit !important;
				font-weight: 700;
				color: var(--clr-label);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				white-space: nowrap;
				z-index: 2;
				user-select: none;
			}
			thead th.sortable {
				cursor: pointer;
			}
			thead th.sortable:hover {
				background: var(--clr-row-hover);
			}
			thead th .sort-arrow {
				display: inline-block;
				margin-left: 4px;
				color: var(--clr-accent);
			}

			thead th:last-child {
				border-right: none;
			}

			tbody tr {
				cursor: pointer;
				border-bottom: 1px solid var(--clr-border-mid);
				transition: background 0.08s;
			}

			tbody tr:hover {
				background: var(--clr-row-hover);
			}
			tbody tr:active {
				background: var(--clr-row-active);
			}

			td {
				padding: 5px 8px;
				border-right: 1px solid var(--clr-border-mid);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				vertical-align: middle;
			}

			td:last-child {
				border-right: none;
			}

			.col-id {
				width: 50px;
				font-family: Consolas, monospace;
			}
			.col-name {
				width: 160px;
			}
			.col-num {
				width: 50px;
				color: var(--clr-muted);
				font-family: Consolas, monospace;
				overflow: visible;
				text-overflow: clip;
			}
			.col-remark {
				width: 36px;
				text-align: center;
				overflow: visible;
				text-overflow: clip;
			}
			.col-obs {
				width: 48px;
			}
			.col-grade {
				width: 56px;
				font-family: Consolas, monospace;
			}
			.col-comments {
				width: 220px;
				text-align: left;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.col-comments.editable-cell.editing {
				white-space: pre-wrap;
			}
			.editable-cell {
				cursor: text;
				outline: none;
			}
			.editable-cell:hover {
				background: var(--clr-row-hover);
				box-shadow: inset 0 0 0 1px var(--clr-border);
			}
			.editable-cell.editing {
				background: var(--clr-bg);
				box-shadow: inset 0 0 0 2px var(--clr-accent);
				white-space: pre-wrap;
				text-align: left;
			}
			.editable-cell.dirty {
				background: #fff4c2;
				box-shadow: inset 0 0 0 1px #d4a300;
			}
			tbody tr.selected .editable-cell.dirty,
			tbody tr:hover .editable-cell.dirty {
				background: #fff4c2 !important;
			}
			#save-btn {
				margin-left: auto;
				padding: 3px 12px;
				font-size: 12px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
				cursor: pointer;
			}
			#save-btn:disabled {
				opacity: 0.5;
				cursor: default;
			}
			#save-btn:not(:disabled):hover {
				background: var(--clr-row-hover);
			}
			.col-int {
				width: 80px;
				text-align: center;
				white-space: nowrap;
				overflow: visible;
				text-overflow: clip;
			}
			.col-follow {
				width: 68px;
				text-align: center;
				font-family: Consolas, monospace;
				font-weight: bold;
			}
			.col-lang {
				width: 70px;
				padding: 4px 8px;
				font-family: Consolas, monospace;
				font-size: 11px;
				text-align: left;
				vertical-align: middle;
				overflow: visible;
				text-overflow: clip;
			}
			.col-lang .lang-pct {
				display: block;
				font-weight: bold;
				line-height: 1.1;
				margin-bottom: 2px;
				color: var(--clr-text);
			}
			.col-lang .lang-bar {
				height: 5px;
				background: var(--clr-bar-track);
				border-radius: 2px;
				overflow: hidden;
			}
			.col-lang .lang-bar-fill {
				height: 100%;
				border-radius: 2px;
			}
			.col-lang-html .lang-bar-fill {
				background: var(--clr-red);
			}
			.col-lang-css .lang-bar-fill {
				background: var(--clr-accent);
			}
			.col-lang-js .lang-bar-fill {
				background: var(--clr-orange);
			}
			.col-lang-py .lang-bar-fill {
				background: var(--clr-purple);
			}
			.col-fingerprint {
				width: auto;
				padding: 0;
				height: 1px;
				vertical-align: middle;
				overflow: visible;
				text-overflow: clip;
				white-space: nowrap;
			}
			.col-fingerprint .fp-wrap {
				display: flex;
				align-items: stretch;
				height: 100%;
			}
			.col-fingerprint .fp-bar {
				position: relative;
				flex: 0 0 160px;
				width: 160px;
				height: 100%;
				overflow: hidden;
			}
			.col-fingerprint .fp-mark {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 1px;
				transform: translateX(-50%);
			}
			.col-fingerprint .fp-mark.lang-html {
				background: var(--clr-red);
			}
			.col-fingerprint .fp-mark.lang-css {
				background: var(--clr-accent);
			}
			.col-fingerprint .fp-mark.lang-js {
				background: var(--clr-orange);
			}
			.col-fingerprint .fp-mark.lang-py {
				background: var(--clr-purple);
			}
			.col-fingerprint .fp-mark.lang-comment {
				background: var(--clr-green);
			}
			.col-fingerprint .fp-mark.lang-unk {
				background: var(--clr-gray);
			}
			.col-fingerprint .fp2-bar,
			.col-fingerprint .fp3-bar {
				display: flex;
				align-items: stretch;
				gap: 1px;
				width: fit-content;
				height: 100%;
			}
			.col-fingerprint .fp2-byte,
			.col-fingerprint .fp3-byte {
				display: flex;
				flex-direction: column;
				flex: 0 0 3px;
				width: 3px;
				background: var(--clr-bar-track);
				overflow: hidden;
			}
			.col-fingerprint .fp2-bit,
			.col-fingerprint .fp3-bit {
				flex: 1;
			}
			.col-fingerprint .fp2-bit.on {
				background: var(--clr-text);
			}
			.col-fingerprint .fp3-bit.on {
				background: var(--clr-green);
			}
			.col-mismatch {
				width: 100%;
				min-width: 80px;
				max-width: 0;
				overflow: hidden;
				padding: 5px 8px;
			}

			tbody tr:hover td:not(.col-mismatch) {
				background: var(--clr-row-hover);
			}
			tbody tr:active td:not(.col-mismatch) {
				background: var(--clr-row-active);
			}
			tbody tr.selected {
				background: var(--clr-row-selected);
			}
			tbody tr.selected td {
				background: var(--clr-row-selected) !important;
			}
			tbody tr.selected:hover td {
				background: var(--clr-row-selected-hover) !important;
			}

			.mismatch-token {
				font-family: Consolas, monospace;
				font-size: 11px;
				font-weight: bold;
			}

			#tip {
				position: fixed;
				display: none;
				background: var(--clr-bg);
				color: var(--clr-text);
				font-size: 11px;
				font-family: Consolas, monospace;
				padding: 5px 10px;
				border-radius: 4px;
				pointer-events: none;
				z-index: 1000;
				max-width: 640px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
				white-space: pre-wrap;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div id="loading">Processing…</div>

		<div id="landing">
			<div id="landing-buttons">
				<button class="landing-btn" onclick="openFolderPicker()">
					📁 Open Folder
				</button>
			</div>
		</div>

		<div id="main">
			<div id="toolbar" class="app-toolbar">
				<span id="lesson-name"></span>
				<label>
					Anonymize:
					<select id="anon-select" onchange="onAnonChange(this.value)">
						<option value="">Show All</option>
						<option value="name">Name Only</option>
						<option value="id">ID Only</option>
					</select>
				</label>
				<span id="basis-picker"></span>
				<button
					id="save-btn"
					type="button"
					disabled
					onclick="_saveActiveBasis()"
				>
					💾 Save
				</button>
			</div>
			<div id="table-wrap">
				<table id="student-table">
					<thead id="thead">
						<tr></tr>
					</thead>
					<tbody id="tbody"></tbody>
				</table>
			</div>
		</div>

		<div id="tip"></div>

		<script src="diff-utils.js"></script>
		<script src="students-state.js"></script>
		<script src="students-load.js"></script>
		<script src="students-parse.js"></script>
		<script src="students-table.js"></script>
		<script src="mini-zip.js"></script>
		<script src="students-save.js"></script>
		<script src="students.js"></script>
		<script src="xlsx.full.min.js"></script>
	</body>
</html>
