<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Students</title>
		<link rel="stylesheet" href="shared/shared.css" />
		<style>
			body {
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
				background: var(--clr-page);
			}

			#landing {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				flex: 1;
				gap: 24px;
				user-select: none;
			}

			#landing-buttons {
				display: flex;
				gap: 16px;
			}

			#toolbar {
				gap: 12px;
			}

			#lesson-name {
				display: none;
				font-weight: bold;
				color: var(--clr-text);
				margin-right: 8px;
			}

			#lesson-name.clickable {
				cursor: pointer;
			}

			#lesson-name.clickable:hover {
				color: var(--clr-accent);
				text-decoration: underline;
			}

			#highlight-chip {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 2px 8px;
				border: 1px solid var(--clr-accent);
				border-radius: 10px;
				font-size: 11px;
				color: var(--clr-accent);
				background: var(--clr-bg);
			}

			#highlight-chip .filter-clear {
				border: none;
				background: none;
				color: var(--clr-accent);
				cursor: pointer;
				font-size: 11px;
				padding: 0;
			}

			#highlight-chip .filter-clear:hover {
				text-decoration: underline;
			}

			#toolbar label {
				display: flex;
				align-items: center;
				gap: 6px;
				color: var(--clr-label);
			}

			#toolbar select {
				font-size: 11px;
				padding: 1px 6px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
			}

			#toolbar select.is-curated {
				color: var(--clr-mark-extra);
			}

			#toolbar select option[value="ideal"],
			#toolbar select option[value="minimal"] {
				color: var(--clr-mark-extra);
			}

			#main {
				display: none;
				flex-direction: column;
				flex: 1;
				min-height: 0;
				overflow: hidden;
			}

			#table-wrap {
				flex: 1;
				overflow-x: hidden;
				overflow-y: auto;
				background: var(--clr-bg);
				position: relative;
			}
			#artefact-highlight-layer {
				position: absolute;
				top: 0;
				left: 0;
				width: 0;
				height: 0;
				pointer-events: none;
			}
			.artefact-highlight-box {
				position: absolute;
				pointer-events: none;
				box-sizing: border-box;
				border: 3.5px solid var(--clr-text);
				border-radius: 3px;
				z-index: 1;
			}
			.artefact-highlight-count {
				position: absolute;
				transform: translateX(-50%);
				white-space: nowrap;
				text-align: center;
				line-height: 1.15;
				pointer-events: none;
				font-size: 11px;
				font-weight: 700;
				color: #000;
				text-shadow:
					-1px -1px 0 #fff,
					1px -1px 0 #fff,
					-1px 1px 0 #fff,
					1px 1px 0 #fff,
					0 0 3px #fff;
				z-index: 1;
			}

			table {
				width: 100%;
				min-width: 100%;
				border-collapse: separate;
				border-spacing: 0;
				font-size: 12px;
			}

			thead th {
				background: var(--clr-surface);
				border-bottom: 2px solid var(--clr-border);
				border-right: 1px solid var(--clr-border);
				padding: 5px 8px;
				text-align: center;
				font-size: 11px !important;
				font-family: inherit !important;
				font-weight: 700;
				color: var(--clr-label);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				white-space: nowrap;
				position: sticky;
				top: 0;
				z-index: 2;
				user-select: none;
			}
			thead th.col-id,
			thead th.col-name,
			thead th.col-num,
			thead th.col-mismatch {
				text-align: left;
			}
			thead th.sortable {
				cursor: pointer;
			}
			thead th.sortable:hover {
				background: var(--clr-row-hover);
			}
			thead th .sort-arrow {
				display: inline-block;
				margin-left: 4px;
				color: var(--clr-accent);
			}

			thead th:last-child {
				border-right: none;
			}

			tbody tr {
				transition: background 0.08s;
			}
			tbody td {
				border-bottom: 1px solid var(--clr-border-mid);
			}

			tbody tr.row-ai {
				opacity: 0.55;
			}
			tbody tr.row-ai td.col-name {
				color: var(--clr-red) !important;
			}
			tbody tr.row-dim {
				opacity: 0.4;
			}
			tbody tr.row-emphasis {
				opacity: 1;
			}
			tbody tr.row-emphasis td:first-child {
				box-shadow: inset 3px 0 0 var(--clr-accent);
			}
			tbody tr.row-nofiles td.col-id,
			tbody tr.row-nofiles td.col-name,
			tbody tr.row-nofiles td.col-num {
				color: var(--clr-fail-fade);
			}

			tbody tr:hover {
				background: var(--clr-row-hover);
			}
			tbody tr:active {
				background: var(--clr-row-active);
			}
			td.clickable-open {
				cursor: pointer;
			}
			td.clickable-open:hover {
				text-decoration: underline;
			}

			td {
				padding: 5px 8px;
				border-right: 1px solid var(--clr-border-mid);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				vertical-align: middle;
			}

			td:last-child {
				border-right: none;
			}

			.col-id {
				width: 50px;
				font-family: Consolas, monospace;
			}
			.col-name {
				width: 160px;
			}
			.name-star {
				color: var(--clr-text);
				margin-right: 4px;
			}
			.col-num {
				width: 50px;
				color: var(--clr-muted);
				font-family: Consolas, monospace;
				overflow: visible;
				text-overflow: clip;
			}
			.col-remark {
				width: 36px;
				text-align: center;
				overflow: visible;
				text-overflow: clip;
			}
			.col-obs {
				width: 48px;
			}
			.col-artefact {
				width: 24px;
				text-align: center;
				white-space: nowrap;
				padding-left: 4px;
				padding-right: 4px;
			}
			.col-artefact:has(+ .col-artefact) {
				border-right: none;
			}
			td.col-artefact {
				position: relative;
			}
			.col-artefact sub {
				text-transform: none;
			}
			.col-artefact.artefact-changed::after {
				content: "";
				position: absolute;
				top: 0;
				right: 0;
				width: 0;
				height: 0;
				border-top: 7px solid #d4a300;
				border-left: 7px solid transparent;
			}
			.col-grade {
				width: 56px;
				font-family: Consolas, monospace;
			}
			.col-comments {
				width: 220px;
				max-width: 220px;
			}
			td.col-comments {
				padding: 0;
				vertical-align: top;
			}
			.comments-inner {
				display: block;
				width: 220px;
				box-sizing: border-box;
				padding: 5px 8px;
				text-align: left;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.comments-inner.editing {
				white-space: pre-wrap;
				word-break: break-word;
				overflow: visible;
				text-overflow: clip;
			}
			.editable-cell {
				cursor: text;
				outline: none;
			}
			.editable-cell:hover {
				background: var(--clr-row-hover);
				box-shadow: inset 0 0 0 1px var(--clr-border);
			}
			.editable-cell.editing {
				background: var(--clr-bg);
				box-shadow: inset 0 0 0 2px var(--clr-accent);
				white-space: pre-wrap;
				text-align: left;
			}
			.editable-cell.dirty {
				background: #fff4c2;
				box-shadow: inset 0 0 0 1px #d4a300;
			}
			tbody tr.selected .editable-cell.dirty,
			tbody tr:hover .editable-cell.dirty {
				background: #fff4c2 !important;
			}
			#columns-picker {
				position: relative;
				margin-left: auto;
			}
			#cols-btn {
				padding: 3px 10px;
				font-size: 12px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
				cursor: pointer;
			}
			#cols-btn:hover {
				background: var(--clr-row-hover);
			}
			#cols-panel {
				position: absolute;
				top: 100%;
				right: 0;
				margin-top: 4px;
				z-index: 100;
				background: var(--clr-bg);
				border: 1px solid var(--clr-border);
				border-radius: 3px;
				padding: 6px 12px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
				white-space: nowrap;
				font-size: 12px;
			}
			#cols-panel label {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 3px 0;
				cursor: pointer;
				color: var(--clr-text);
			}
			#cols-panel label:hover {
				color: var(--clr-accent);
			}
			.col-follow .follow-pct {
				display: block;
				font-weight: bold;
				line-height: 1.1;
				margin-bottom: 2px;
				color: var(--clr-text);
			}
			.col-follow .follow-bar {
				height: 5px;
				background: var(--clr-bar-track);
				border-radius: 2px;
				overflow: hidden;
			}
			.col-follow .follow-bar-fill {
				height: 100%;
				background: var(--clr-text-strong);
				border-radius: 2px;
			}
			#save-btn {
				padding: 3px 12px;
				font-size: 12px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
				cursor: pointer;
			}
			#save-btn:disabled {
				opacity: 0.5;
				cursor: default;
			}
			#save-btn:not(:disabled):hover {
				background: var(--clr-row-hover);
			}
			.col-int {
				width: 80px;
				text-align: center;
				white-space: nowrap;
				overflow: visible;
				text-overflow: clip;
			}
			.col-follow {
				width: 70px;
				padding: 4px 8px;
				text-align: left;
				font-family: Consolas, monospace;
				vertical-align: middle;
				overflow: visible;
				text-overflow: clip;
			}
			.col-lang {
				width: 70px;
				padding: 4px 8px;
				font-family: Consolas, monospace;
				font-size: 11px;
				text-align: left;
				vertical-align: middle;
				overflow: visible;
				text-overflow: clip;
			}
			.col-lang .lang-pct {
				display: block;
				font-weight: bold;
				line-height: 1.1;
				margin-bottom: 2px;
				color: var(--clr-text);
			}
			.col-lang .lang-bar {
				height: 5px;
				background: var(--clr-bar-track);
				border-radius: 2px;
				overflow: hidden;
			}
			.col-lang .lang-bar-fill {
				height: 100%;
				border-radius: 2px;
			}
			.col-lang-html .lang-bar-fill {
				background: var(--clr-red);
			}
			.col-lang-css .lang-bar-fill {
				background: var(--clr-accent);
			}
			.col-lang-js .lang-bar-fill {
				background: var(--clr-orange);
			}
			.col-lang-py .lang-bar-fill {
				background: var(--clr-purple);
			}
			.col-fingerprint {
				width: auto;
				padding: 0;
				height: 1px;
				vertical-align: middle;
				overflow: visible;
				text-overflow: clip;
				white-space: nowrap;
			}
			.col-fingerprint .fp-wrap {
				display: flex;
				align-items: stretch;
				height: 100%;
			}
			.col-fingerprint .fp-bar {
				position: relative;
				flex: 0 0 160px;
				width: 160px;
				height: 100%;
				overflow: hidden;
			}
			.col-fingerprint .fp-mark {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 1px;
				transform: translateX(-50%);
			}
			.col-fingerprint .fp-mark.lang-html {
				background: var(--clr-red);
			}
			.col-fingerprint .fp-mark.lang-css {
				background: var(--clr-accent);
			}
			.col-fingerprint .fp-mark.lang-js {
				background: var(--clr-orange);
			}
			.col-fingerprint .fp-mark.lang-py {
				background: var(--clr-purple);
			}
			.col-fingerprint .fp-mark.lang-unk {
				background: var(--clr-gray);
			}
			.col-fingerprint .fp2-bar,
			.col-fingerprint .fp3-bar {
				display: flex;
				align-items: stretch;
				gap: 0;
				width: fit-content;
				height: 100%;
			}
			.col-fingerprint .fp2-byte,
			.col-fingerprint .fp3-byte {
				display: flex;
				flex-direction: column;
				flex: 0 0 2px;
				width: 2px;
				overflow: hidden;
				margin-right: 1px;
			}
			.col-fingerprint .fp2-bit,
			.col-fingerprint .fp3-bit {
				flex: 1;
			}
			.col-fingerprint .fp2-bit.on {
				background: var(--clr-text);
			}
			.col-fingerprint .fp3-bit.on {
				background: var(--clr-green);
			}
			.col-mismatch {
				width: 100%;
				min-width: 80px;
				max-width: 0;
				overflow: hidden;
				padding: 5px 8px;
			}

			tbody tr:hover td:not(.col-mismatch) {
				background: var(--clr-row-hover);
			}
			tbody tr:active td:not(.col-mismatch) {
				background: var(--clr-row-active);
			}
			tbody tr.selected {
				background: var(--clr-row-selected);
			}
			tbody tr.selected td {
				background: var(--clr-row-selected) !important;
			}
			tbody tr.selected:hover td {
				background: var(--clr-row-selected-hover) !important;
			}
			tbody tr.totals-row td {
				border-top: 2px solid var(--clr-muted);
				background: var(--clr-bar-track);
				font-weight: bold;
				position: sticky;
				bottom: 0;
				z-index: 2;
			}
			tbody tr.totals-row:hover td:not(.col-mismatch) {
				background: var(--clr-bar-track) !important;
			}

			.mismatch-token {
				font-family: Consolas, monospace;
				font-size: 11px;
				font-weight: bold;
			}

			#content-row {
				display: flex;
				flex: 1;
				min-height: 0;
			}
			#left-col {
				display: flex;
				flex-direction: column;
				flex: 1 1 0;
				min-width: 0;
				min-height: 0;
				overflow: hidden;
			}
			#table-wrap {
				min-width: 0;
			}
			#assignment-divider {
				flex: 0 0 6px;
				cursor: col-resize;
				background: var(--clr-border);
			}
			#assignment-divider:hover {
				background: var(--clr-accent);
			}
			#side-col {
				flex: 0 0 40%;
				min-width: 0;
				display: flex;
				flex-direction: column;
				background: var(--clr-bg);
				border-left: 1px solid var(--clr-border);
				overflow: hidden;
			}
			#side-col[hidden] {
				display: none;
			}
			#asgn-pane {
				flex: 1 1 0;
				display: flex;
				flex-direction: column;
				min-height: 0;
				overflow: hidden;
			}
			#student-pane {
				flex: 0 0 45%;
				display: flex;
				flex-direction: column;
				min-height: 0;
				overflow: hidden;
			}
			#panes-divider {
				flex: 0 0 4px;
				background: var(--clr-border);
				cursor: row-resize;
				user-select: none;
				touch-action: none;
				transition: background 0.15s;
			}
			#panes-divider:hover {
				background: var(--clr-accent);
			}
			.sp-head {
				display: flex;
				align-items: center;
				gap: 6px;
				flex-wrap: wrap;
				padding: 4px 6px;
				background: var(--clr-surface);
				border-bottom: 1px solid var(--clr-border);
				flex-shrink: 0;
			}
			#asgn-timeline {
				margin-left: auto;
			}
			body.paper-mode #toolbar {
				display: none;
			}
			.sp-label {
				font-size: 11px;
				font-weight: bold;
				color: var(--clr-text);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 40%;
			}
			.sp-toggle {
				display: inline-flex;
				gap: 2px;
			}
			.sp-toggle button {
				padding: 2px 8px;
				font-size: 11px;
				border: 1px solid var(--clr-diff-btn-border);
				background: var(--clr-bg);
				color: var(--clr-text);
				cursor: pointer;
				border-radius: 3px;
			}
			.sp-toggle button:hover {
				background: var(--clr-row-hover);
			}
			.sp-toggle button.active {
				background: var(--clr-accent);
				color: #fff;
			}
			#asgn-view-toggle {
				margin-left: 12px;
			}
			.sp-collapse-btn {
				border: none;
				background: none;
				color: var(--clr-muted);
				cursor: pointer;
				font-size: 12px;
				line-height: 1;
				padding: 0 2px;
			}
			.sp-collapse-btn:hover {
				color: var(--clr-accent);
			}
			.sp-diff-btn {
				padding: 2px 8px;
				font-size: 11px;
				border: 1px solid var(--clr-diff-btn-border);
				background: var(--clr-bg);
				color: var(--clr-text);
				cursor: pointer;
				border-radius: 3px;
			}
			.sp-diff-btn:hover {
				background: var(--clr-row-hover);
			}
			.sp-body {
				flex: 1 1 0;
				min-height: 0;
				position: relative;
				display: flex;
			}
			.sp-body > pre.sp-editor {
				flex: 1 1 0;
				margin: 0;
				overflow: auto;
				background: var(--clr-bg);
				color: var(--clr-text);
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				padding: 6px 8px;
				white-space: pre-wrap;
				word-break: break-all;
				min-height: 0;
			}
			.sp-body > iframe.sp-preview {
				flex: 1 1 0;
				border: 0;
				background: #fff;
				min-height: 0;
			}
			.sp-body[data-view="code"] > iframe.sp-preview {
				display: none;
			}
			.sp-body[data-view="preview"] > pre.sp-editor {
				display: none;
			}
			.sp-empty {
				position: absolute;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				padding: 0 16px;
				text-align: center;
				color: var(--clr-muted);
				font-size: 13px;
				background: var(--clr-bg);
				z-index: 1;
			}
			.sp-body > iframe.sp-diff-frame {
				flex: 1 1 0;
				width: 100%;
				border: 0;
				background: var(--clr-bg);
				min-height: 0;
			}
			#student-code-view {
				flex: 1 1 0;
				min-width: 0;
				min-height: 0;
				display: flex;
				flex-direction: column;
			}
			#student-code-view[hidden] {
				display: none;
			}
			#student-code-fv {
				flex: 1 1 0;
				min-width: 0;
				min-height: 0;
			}
			#asgn-pane .sp-head {
				background: var(--clr-pos);
			}
			#asgn-pane .sp-label {
				color: var(--clr-white);
				max-width: none;
			}
			#asgn-pane .sp-collapse-btn {
				color: var(--clr-white);
			}
			#asgn-body,
			#asgn-body > pre.sp-editor,
			#asgn-body > iframe.sp-preview {
				background: var(--clr-tip-bg-green);
			}
			#side-col.asgn-collapsed #asgn-pane {
				flex: 0 0 auto;
			}
			#side-col.asgn-collapsed #asgn-pane .sp-body {
				display: none;
			}
			#side-col.asgn-collapsed #panes-divider {
				display: none;
			}
			#side-col.asgn-collapsed #student-pane {
				flex: 1 1 0 !important;
			}
			body.paper-mode #left-col {
				flex: 0 0 auto;
				max-width: 40vw;
			}
			body.paper-mode #table-wrap {
				overflow: auto;
			}
			body.paper-mode #side-col {
				flex: 1 1 0 !important;
			}
			body.paper-mode #assignment-divider {
				display: none;
			}
			body.paper-mode #asgn-view-toggle {
				display: none;
			}
			#assignment-toggle {
				padding: 3px 10px;
				font-size: 12px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
				cursor: pointer;
			}
			#assignment-toggle:hover {
				background: var(--clr-row-hover);
			}
			#assignment-toggle.active {
				background: var(--clr-accent);
				color: #fff;
			}
			.doc-link {
				cursor: pointer;
				margin-left: 5px;
				font-size: 13px;
				text-decoration: none;
			}
			.doc-link:hover {
				filter: brightness(1.25);
			}
			.fv-editor.fv-doc-mode {
				white-space: normal;
				font-family: sans-serif;
				padding: 0;
			}
			.fv-editor.fv-doc-mode .fv-doc {
				padding: 12px 16px;
				color: #222;
				font-size: 14px;
				line-height: 1.6;
			}
			.fv-editor.fv-doc-mode .fv-doc img {
				max-width: 100%;
				height: auto;
			}
			.fv-editor.fv-doc-mode .fv-doc-img {
				display: block;
				max-width: 100%;
				height: auto;
				margin: 0 auto;
				padding: 12px;
			}
			.fv-editor.fv-doc-mode .fv-doc-frame {
				width: 100%;
				height: 100%;
				border: 0;
				display: block;
			}

			#tip {
				position: fixed;
				display: none;
				background: var(--clr-bg);
				color: var(--clr-text);
				font-size: 11px;
				font-family: Consolas, monospace;
				padding: 5px 10px;
				border-radius: 4px;
				pointer-events: none;
				z-index: 1000;
				max-width: 640px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
				white-space: pre-wrap;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div id="loading">Loading…</div>

		<div id="landing">
			<div id="landing-buttons">
				<button class="landing-btn" onclick="openFolderPicker()">
					📁 Open Folder
				</button>
			</div>
		</div>
		<script>
			(function () {
				const qs = new URLSearchParams(location.search);
				if (qs.get("lesson") || qs.get("autoload") === "1") {
					const l = document.getElementById("landing");
					const o = document.getElementById("loading");
					if (l) l.style.display = "none";
					if (o) o.style.display = "flex";
				}
			})();
		</script>

		<div id="main">
			<div id="content-row">
				<div id="left-col">
					<div id="toolbar" class="app-toolbar">
						<span id="lesson-name"></span>
						<span id="basis-picker"></span>
						<span id="columns-picker">
							<button
								id="cols-btn"
								type="button"
								onclick="_toggleColsPanel()"
							>
								Columns ▾
							</button>
							<div id="cols-panel" hidden></div>
						</span>
						<button
							id="assignment-toggle"
							type="button"
							onclick="_toggleSidePanel()"
						>
							📋 Panel
						</button>
						<button
							id="save-btn"
							type="button"
							disabled
							onclick="_saveActiveBasis()"
						>
							💾 Save
						</button>
					</div>
					<div id="table-wrap">
						<table id="student-table">
							<thead id="thead">
								<tr></tr>
							</thead>
							<tbody id="tbody"></tbody>
						</table>
					</div>
				</div>
				<div id="assignment-divider" hidden></div>
				<div id="side-col" hidden>
					<div id="asgn-pane">
						<div class="sp-head">
							<button
								class="sp-collapse-btn"
								id="asgn-collapse"
								type="button"
								title="Collapse assignment"
							>
								▾
							</button>
							<span class="sp-label">Instructions</span>
							<div class="sp-toggle">
								<button id="asgn-view-preview" type="button">
									Preview
								</button>
								<button id="asgn-view-code" type="button">HTML</button>
							</div>
							<div
								class="sp-toggle"
								id="asgn-view-toggle"
								hidden
								title="Toggle the panel between the differentiator and the student's code + preview"
							>
								<button
									id="asgn-view-diff"
									type="button"
									class="active"
								>
									Diff
								</button>
								<button id="asgn-view-stu-code" type="button">
									Code
								</button>
							</div>
							<button
								id="asgn-timeline"
								class="sp-diff-btn"
								type="button"
								hidden
								title="Open timeline for this lesson"
							>
								Timeline
							</button>
							<button
								id="asgn-simulator"
								class="sp-diff-btn"
								type="button"
								hidden
								title="Open simulator for this lesson"
							>
								Simulator
							</button>
							<button
								id="asgn-download-plan"
								class="sp-diff-btn"
								type="button"
								hidden
								title="Download lesson plan (zip)"
							>
								Download Plan
							</button>
						</div>
						<div class="sp-body" id="asgn-body" data-view="preview">
							<pre class="sp-editor" id="asgn-editor"></pre>
							<iframe
								class="sp-preview"
								id="asgn-preview"
								title="Assignment"
								sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads"
							></iframe>
						</div>
					</div>
					<div id="panes-divider" title="Drag to resize"></div>
					<div id="student-pane">
						<div class="sp-body" id="student-body">
							<iframe
								class="sp-diff-frame"
								id="student-diff-frame"
								title="Differentiator"
							></iframe>
							<div class="sp-empty" id="student-empty">
								Select a student row to load the differentiator
							</div>
							<div id="student-code-view" hidden>
								<div id="student-code-fv"></div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="tip"></div>

		<script src="shared/diff-utils.js"></script>
		<script src="preview.js"></script>
		<script src="shared/data-source.js"></script>
		<script src="shared/drag-divider.js"></script>
		<script src="languages/profiles.js"></script>
		<script src="shared/simulator-highlight.js"></script>
		<script src="shared/file-viewer.js"></script>
		<script src="shared/mammoth.browser.min.js"></script>
		<script src="students/state.js"></script>
		<script src="students/load.js"></script>
		<script src="students/parse.js"></script>
		<script src="students/unicode.js"></script>
		<script src="students/sort.js"></script>
		<script src="students/fingerprint.js"></script>
		<script src="students/docs.js"></script>
		<script src="students/tooltip.js"></script>
		<script src="students/table.js"></script>
		<script src="students/viewers.js"></script>
		<script src="shared/mini-zip.js"></script>
		<script src="students/save.js"></script>
		<script src="students/index.js"></script>
		<script src="shared/xlsx.full.min.js"></script>
	</body>
</html>
