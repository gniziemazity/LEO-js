<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Students</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			body {
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
				background: var(--clr-page);
			}

			#landing {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				flex: 1;
				gap: 24px;
				user-select: none;
			}

			#landing-buttons {
				display: flex;
				gap: 16px;
			}

			#toolbar {
				gap: 12px;
			}

			#lesson-name {
				font-weight: bold;
				color: var(--clr-text);
				margin-right: 8px;
			}

			#lesson-name.clickable {
				cursor: pointer;
			}

			#lesson-name.clickable:hover {
				color: var(--clr-accent);
				text-decoration: underline;
			}

			#toolbar label {
				display: flex;
				align-items: center;
				gap: 6px;
				color: var(--clr-label);
			}

			#toolbar select {
				font-size: 11px;
				padding: 1px 6px;
				border: 1px solid var(--clr-diff-btn-border);
				border-radius: 3px;
				background: var(--clr-bg);
			}

			#main {
				display: none;
				flex-direction: column;
				flex: 1;
				min-height: 0;
				overflow: hidden;
			}

			#table-wrap {
				flex: 1;
				overflow-x: hidden;
				overflow-y: auto;
				background: var(--clr-bg);
			}

			table {
				width: 100%;
				min-width: 100%;
				border-collapse: collapse;
				font-size: 12px;
			}

			thead th {
				background: var(--clr-surface);
				border-bottom: 2px solid var(--clr-border);
				border-right: 1px solid var(--clr-border);
				padding: 5px 8px;
				text-align: left;
				font-size: 11px !important;
				font-family: inherit !important;
				font-weight: 700;
				color: var(--clr-label);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				white-space: nowrap;
				z-index: 2;
			}

			thead th:last-child {
				border-right: none;
			}

			tbody tr {
				cursor: pointer;
				border-bottom: 1px solid var(--clr-border-mid);
				transition: background 0.08s;
			}

			tbody tr:hover {
				background: var(--clr-row-hover);
			}
			tbody tr:active {
				background: var(--clr-row-active);
			}

			td {
				padding: 5px 8px;
				border-right: 1px solid var(--clr-border-mid);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				vertical-align: middle;
			}

			td:last-child {
				border-right: none;
			}

			.col-id {
				width: 50px;
				font-family: Consolas, monospace;
			}
			.col-name {
				width: 160px;
			}
			.col-num {
				width: 50px;
				color: var(--clr-muted);
				font-family: Consolas, monospace;
				overflow: visible;
				text-overflow: clip;
			}
			.col-remark {
				width: 36px;
				text-align: center;
				overflow: visible;
				text-overflow: clip;
			}
			.col-int {
				width: 80px;
				text-align: center;
				white-space: nowrap;
				overflow: visible;
				text-overflow: clip;
			}
			.col-follow {
				width: 68px;
				text-align: center;
				font-family: Consolas, monospace;
				font-weight: bold;
			}
			.col-mismatch {
				width: 100%;
				min-width: 80px;
				max-width: 0;
				overflow: hidden;
				padding: 5px 8px;
			}

			tbody tr:hover td:not(.col-mismatch) {
				background: var(--clr-row-hover);
			}
			tbody tr:active td:not(.col-mismatch) {
				background: var(--clr-row-active);
			}
			tbody tr.selected {
				background: var(--clr-row-selected);
			}
			tbody tr.selected td {
				background: var(--clr-row-selected) !important;
			}
			tbody tr.selected:hover td {
				background: var(--clr-row-selected-hover) !important;
			}

			.mismatch-token {
				font-family: Consolas, monospace;
				font-size: 11px;
				font-weight: bold;
			}

			#tip {
				position: fixed;
				display: none;
				background: var(--clr-bg);
				color: var(--clr-text);
				font-size: 11px;
				font-family: Consolas, monospace;
				padding: 5px 10px;
				border-radius: 4px;
				pointer-events: none;
				z-index: 1000;
				max-width: 640px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
				white-space: pre-wrap;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div id="loading">Processing…</div>

		<div id="landing">
			<div id="landing-buttons">
				<button class="landing-btn" onclick="openFolderPicker()">
					📁 Open Folder
				</button>
			</div>
		</div>

		<div id="main">
			<div id="toolbar" class="app-toolbar">
				<span id="lesson-name"></span>
				<label>
					Anonymize:
					<select id="anon-select" onchange="onAnonChange(this.value)">
						<option value="">Show All</option>
						<option value="name">Name Only</option>
						<option value="id">ID Only</option>
					</select>
				</label>
			</div>
			<div id="table-wrap">
				<table id="student-table">
					<thead id="thead">
						<tr></tr>
					</thead>
					<tbody id="tbody"></tbody>
				</table>
			</div>
		</div>

		<div id="tip"></div>

		<script src="diff-utils.js"></script>
		<script src="students.js"></script>
		<script src="xlsx.full.min.js"></script>
	</body>
</html>
