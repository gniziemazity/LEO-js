<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Dashboard</title>
		<link rel="stylesheet" href="shared.css" />
		<link rel="stylesheet" href="dashboard.css" />
	</head>
	<body>
		<div id="landing">
			<div id="landing-buttons">
				<button class="landing-btn" onclick="openFilePicker()">
					📄 Open Log File
				</button>
				<button class="landing-btn" onclick="openFolderPicker()">
					📁 Open Folder
				</button>
			</div>
		</div>

		<div id="main">
			<div id="charts">
				<div class="chart-section" id="chart1-section">
					<div class="chart-wrap"><canvas id="chart1"></canvas></div>
					<button
						id="btn-open-sim"
						onclick="window.open('simulator.html')"
						title="Simulate Lesson"
					>
						▶
					</button>
				</div>
				<div class="chart-section" id="chart2-section">
					<div class="chart-wrap"><canvas id="chart2"></canvas></div>
				</div>
				<div
					class="chart-section"
					id="chart3-section"
					style="display: none"
				>
					<div class="chart-wrap"><canvas id="chart3"></canvas></div>
					<button id="btn-shake" onclick="toggleShake()" title="Shake">
						🎲
					</button>
				</div>
			</div>
		</div>

		<div id="loading">Processing…</div>
		<div id="tooltip"></div>

		<script src="kla-config.js"></script>
		<script src="kla-utils.js"></script>
		<script src="kla-data.js"></script>
		<script src="kla-render.js"></script>
		<script src="kla-zoom.js"></script>
		<script src="kla-tooltip.js"></script>
		<script src="kla-students.js"></script>
		<script src="kla-diff.js"></script>
		<script src="kla-app.js"></script>

		<script
			src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"
			async
		></script>
	</body>
</html>
