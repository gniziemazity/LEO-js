<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Grades Overview</title>
		<link rel="stylesheet" href="shared.css" />
		<link rel="stylesheet" href="overview.css" />
	</head>
	<body>
		<div id="landing">
			<h1>Grades Dashboard</h1>
			<button class="landing-btn-primary" id="open-btn">
				Open Course Folder
			</button>
		</div>

		<div id="toolbar">
			<button class="active" data-page="students">Students</button>
			<button data-page="stats">Statistics</button>
			<button data-page="progress">Progress</button>
			<div class="sep"></div>
			<span id="nav-info"></span>
			<div class="sep"></div>
			<label style="font-size: 11px; color: #555"
				>Anonymize:
				<select
					id="anon-select"
					style="
						font-size: 11px;
						padding: 2px 4px;
						border: 1px solid #ccc;
						border-radius: 3px;
					"
					onchange="onAnonChange(this.value)"
				>
					<option value="">Show All</option>
					<option value="name" selected>Name Only</option>
					<option value="id">ID Only</option>
				</select>
			</label>
		</div>

		<div id="page-students" class="page">
			<div class="table-wrap"><table id="grades-table"></table></div>
		</div>

		<div id="page-stats" class="page">
			<div id="stats-no-data" style="display: none">
				Run <code>npm run grades-analyze</code> first to generate
				statistics.
			</div>
			<div class="stats-body" id="stats-body"></div>
		</div>

		<div id="page-progress" class="page">
			<div class="sort-bar">
				<span>Sort by:</span>
				<button class="active" data-sort="name">Name</button>
				<button data-sort="avg-follow">Avg Follow ↓</button>
				<button data-sort="total-follow">Total Follow ↓</button>
				<button data-sort="avg-grade">Avg Grade ↓</button>
				<button data-sort="total-grade">Total Grade ↓</button>
			</div>
			<div class="prog-grid" id="prog-grid"></div>
		</div>

		<div id="loading">Loading…</div>

		<script src="kla-utils.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@sgratzl/chartjs-chart-boxplot@4.2.4/build/index.umd.min.js"></script>
		<script src="charts/overview-charts.js"></script>
		<script src="overview.js"></script>
	</body>
</html>
