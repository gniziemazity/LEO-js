<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Grades Overview</title>
		<link rel="stylesheet" href="shared/shared.css" />
		<link rel="stylesheet" href="overview/overview.css" />
	</head>
	<body>
		<div id="landing">
			<h1>Grades Dashboard</h1>
			<button class="landing-btn-primary" id="open-btn">
				Open Course Folder
			</button>
		</div>

		<div id="toolbar" class="app-toolbar">
			<button class="active" data-page="students">Students</button>
			<button data-page="stats">Statistics</button>
			<button data-page="clusters">Progress</button>
			<div class="sep"></div>
			<button id="open-btn-toolbar">Open Folder…</button>
			<div class="sep"></div>
			<span id="nav-info"></span>
			<div class="sep"></div>
			<label style="font-size: 11px; color: var(--clr-label)"
				>Anonymize:
				<select
					id="anon-select"
					style="
						font-size: 11px;
						padding: 2px 4px;
						border: 1px solid var(--clr-border);
						border-radius: 3px;
					"
					onchange="onAnonChange(this.value)"
				>
					<option value="">Show All</option>
					<option value="name" selected>Name Only</option>
					<option value="id">ID Only</option>
				</select>
			</label>
			<label
				style="font-size: 11px; color: var(--clr-label); margin-left: 8px"
			>
				<input
					type="checkbox"
					id="hide-excluded"
					onchange="onHideExcludedChange(this.checked)"
				/>
				Hide excluded
			</label>
		</div>

		<div id="page-students" class="page">
			<div class="table-wrap"><table id="grades-table"></table></div>
		</div>

		<div id="page-stats" class="page">
			<div id="stats-no-data" style="display: none">
				Run <code>npm run overview</code> first to generate statistics.
			</div>
			<div class="stats-body" id="stats-body"></div>
		</div>

		<div id="page-clusters" class="page">
			<div class="sort-bar">
				<span>Sort:</span>
				<button class="cluster-sort active" data-cluster-sort="id">
					ID
				</button>
				<button class="cluster-sort" data-cluster-sort="avg-follow">
					Avg Follow ↓
				</button>
				<button class="cluster-sort" data-cluster-sort="total-follow">
					Total Follow ↓
				</button>
				<button class="cluster-sort" data-cluster-sort="signals">
					Signals ↓
				</button>
				<span class="sep" style="margin: 0 8px; color: var(--clr-label)"
					>|</span
				>
				<span>Follow:</span>
				<div class="sp-toggle" id="follow-mode-toggle">
					<button id="follow-mode-total" class="active" type="button">
						Total
					</button>
					<button id="follow-mode-lang" type="button">Per-language</button>
				</div>
				<label style="font-size: 11px; color: var(--clr-label)">
					<input type="checkbox" id="cluster-show-signals" checked />
					Signals
				</label>
				<span class="sep" style="margin: 0 8px; color: var(--clr-label)"
					>|</span
				>
				<span>Clusters:</span>
				<select
					id="cluster-mode"
					style="
						font-size: 11px;
						padding: 2px 4px;
						border: 1px solid var(--clr-border);
						border-radius: 3px;
					"
				>
					<option value="kmeans" selected>K-means</option>
					<option value="manualA">Manual A</option>
				</select>
				<span class="cluster-kmeans-only">K:</span>
				<input
					type="number"
					id="cluster-k"
					min="1"
					max="25"
					step="1"
					value="1"
					class="cluster-kmeans-only"
					style="
						width: 48px;
						font-size: 11px;
						padding: 2px 4px;
						border: 1px solid var(--clr-border);
						border-radius: 3px;
					"
				/>
			</div>
			<div
				id="cluster-manual-panel"
				style="
					display: none;
					padding: 8px 12px;
					border-bottom: 1px solid var(--clr-border);
				"
			>
				<div
					style="
						font-size: 11px;
						color: var(--clr-label);
						margin-bottom: 4px;
					"
				>
					One cluster per line, IDs comma- or space-separated. Use
					<code>rest</code> for everyone else.
				</div>
				<textarea
					data-manual-text="A"
					rows="6"
					style="
						width: 100%;
						font-family: monospace;
						font-size: 11px;
						padding: 6px;
						border: 1px solid var(--clr-border);
						border-radius: 3px;
						resize: vertical;
					"
				></textarea>
				<div style="margin-top: 4px">
					<button id="cluster-manual-apply">Apply</button>
				</div>
			</div>
			<div class="clusters-body" id="clusters-body"></div>
		</div>

		<div id="loading">Loading…</div>

		<script src="shared/timeline-utils.js"></script>
		<script src="shared/xlsx.full.min.js"></script>
		<script src="../src/shared/charts/utils.js"></script>
		<script src="../src/shared/charts/scatter/scatter-chart.js"></script>
		<script src="../src/shared/charts/bar/bar-chart.js"></script>
		<script src="../src/shared/charts/line/line-chart.js"></script>
		<script src="../src/shared/charts/boxplot/boxplot-chart.js"></script>
		<script src="shared/diff-utils.js"></script>
		<script src="shared/data-source.js"></script>
		<script src="overview/state.js"></script>
		<script src="overview/data.js"></script>
		<script src="overview/table.js"></script>
		<script src="overview/charts.js"></script>
		<script src="overview/stats.js"></script>
		<script src="overview/clusters.js"></script>
		<script src="overview/progress.js"></script>
		<script src="overview/index.js"></script>
	</body>
</html>

<script src="overview/llm-stats.js"></script>
<script src="overview/lesson-stats.js"></script>
