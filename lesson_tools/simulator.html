<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>📋 Simulator</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			html,
			body {
				height: 100%;
				width: 100%;
				overflow: hidden;
				background: #e8e8e8;
			}

			#vis-root {
				display: flex;
				height: 100vh;
				width: 100%;
			}

			#vis-left {
				display: flex;
				flex-direction: column;
				flex: 1 1 0;
				min-width: 0;
				border-right: 2px solid #ccc;
			}

			#vis-right {
				display: flex;
				flex-direction: column;
				flex: 0 0 33.33%;
				min-width: 0;
				background: #f9f9f9;
			}

			#vis-right-main {
				display: flex;
				flex-direction: column;
				flex: 1 1 0;
				min-height: 0;
			}

			#vis-toolbar {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 6px 10px;
				background: #e8e8e8;
				border-bottom: 1px solid #ccc;
				flex-shrink: 0;
				flex-wrap: wrap;
			}

			#vis-toolbar button {
				padding: 4px 12px;
				border: none;
				border-radius: 3px;
				cursor: pointer;
				font-size: 12px;
				color: #fff;
			}

			#btn-play {
				background: #2d8f2d;
			}
			#btn-reset {
				background: #7a6500;
			}
			#btn-settings {
				background: #f0f0f8;
				color: #0000ff !important;
			}
			#btn-toggle-log,
			#btn-toggle-devtools {
				background: #888;
				padding: 4px 8px;
			}
			#btn-toggle-log:hover,
			#btn-toggle-devtools:hover {
				background: #666;
			}

			#vis-toolbar label {
				font-size: 12px;
				color: #888;
				display: flex;
				align-items: center;
				gap: 4px;
			}
			#speed-slider {
				width: 120px;
			}
			#speed-label {
				font-size: 12px;
				font-weight: bold;
				color: #007acc;
				min-width: 32px;
			}

			#vis-seekbar {
				height: 10px;
				background: #f3f3f3;
				cursor: pointer;
				flex-shrink: 0;
				position: relative;
				border-bottom: 1px solid #ddd;
			}
			#vis-seekfill {
				height: 100%;
				background: #007acc;
				width: 0%;
				pointer-events: none;
			}

			#vis-main {
				display: flex;
				flex: 1 1 0;
				min-height: 0;
				overflow: hidden;
			}

			#vis-editor-wrap {
				display: flex;
				flex-direction: column;
				flex: 1 1 0;
				min-width: 0;
				overflow: hidden;
				position: relative;
			}

			pre#vis-editor {
				flex: 1 1 0;
				overflow: auto;
				background: #ffffff;
				color: #1e1e1e;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				padding: 6px 8px;
				white-space: pre-wrap;
				word-break: break-all;
				min-height: 0;
			}

			#vis-event-log-wrap {
				width: 260px;
				flex-shrink: 0;
				display: flex;
				flex-direction: column;
				border-left: 1px solid #ddd;
				background: #f3f3f3;
				overflow: hidden;
			}

			#vis-event-log {
				flex: 1 1 0;
				overflow-y: auto;
				font-family: Consolas, monospace;
				font-size: 10px;
				padding: 4px 6px;
				white-space: pre-wrap;
				word-break: break-all;
				color: #007acc;
			}

			#vis-preview {
				flex: 2 1 0;
				min-height: 0;
				border: none;
				background: #fff;
			}

			#vis-dev-outer {
				flex: 1 1 0;
				min-height: 0;
				display: flex;
				flex-direction: column;
				background: #f5f5f5;
				border-top: 1px solid #ddd;
			}

			pre#vis-dev-editor {
				flex: 1 1 0;
				overflow: auto;
				background: #f5f5f5;
				color: #009900;
				font-family: Consolas, "Courier New", monospace;
				font-size: 11px;
				line-height: 1.5;
				padding: 4px 6px;
				white-space: pre-wrap;
				word-break: break-all;
				min-height: 0;
			}

			#vis-file-tabs {
				display: flex;
				flex-wrap: wrap;
				background: #e8e8e8;
				border-bottom: 1px solid #ccc;
				flex-shrink: 0;
			}
			#vis-file-tabs:empty {
				display: none;
			}

			@keyframes anchor-flash {
				0% {
					outline: 2px solid #007acc;
				}
				60% {
					outline: 2px solid #007acc;
				}
				100% {
					outline: 2px solid transparent;
				}
			}
			pre#vis-editor.anchor-flash .vis-cursor {
				background: #007acc;
				animation: none;
			}

			.vis-cursor {
				display: inline-block;
				width: 1px;
				background: #000;
				color: transparent;
				font-size: 0;
				vertical-align: text-bottom;
				height: 1.2em;
				animation: blink 1s step-end infinite;
			}
			@keyframes blink {
				50% {
					background: transparent;
				}
			}

			#settings-modal {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.4);
				z-index: 100;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#settings-box {
				background: #f0f0f8;
				border-radius: 6px;
				padding: 20px 24px;
				min-width: 460px;
				max-height: 80vh;
				overflow-y: auto;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
			}
			#settings-box table {
				border-collapse: collapse;
				width: 100%;
			}
			#settings-box td {
				padding: 3px 6px;
				font-size: 12px;
			}
			#btn-close-settings {
				padding: 5px 18px;
				background: #007acc;
				color: #fff;
				border: none;
				border-radius: 3px;
				cursor: pointer;
				font-size: 12px;
			}

			#vis-hover-tip {
				position: fixed;
				display: none;
				background: #1e1e1e;
				color: #d4d4d4;
				font-family: Consolas, monospace;
				font-size: 11px;
				padding: 3px 7px;
				border-radius: 3px;
				pointer-events: none;
				z-index: 200;
				white-space: nowrap;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
			}

			#lv-landing {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #e8e8e8;
				z-index: 500;
			}
			#lv-landing-box {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 18px;
			}
			#lv-landing-title {
				font-size: 22px;
				font-weight: bold;
				color: #1e1e1e;
			}
		</style>
	</head>
	<body>
		<div id="lv-landing">
			<div id="lv-landing-box">
				<div id="lv-landing-title">📋 Simulator</div>
				<button id="btn-open-log" class="landing-btn-primary">
					📄 Select a Lesson
				</button>
			</div>
		</div>
		<input
			type="file"
			id="lv-file-input"
			accept=".json"
			style="display: none"
		/>
		<div id="vis-root"></div>
		<script>
			window.__LOG_DATA__ = null;
		</script>
		<script src=".last_vis_data.js" onerror="void 0"></script>
		<script src="preview.js"></script>
		<script src="simulator.js"></script>
	</body>
</html>
