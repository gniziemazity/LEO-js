<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Assignments</title>
		<link rel="stylesheet" href="shared.css" />
		<style>
			body {
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
				background: var(--clr-page);
			}

			#toolbar button {
				padding: 2px 10px;
				border: 1px solid var(--clr-border-strong);
				border-radius: 3px;
				background: var(--clr-bg);
				color: var(--clr-label);
				cursor: pointer;
				font-size: 11px;
				font-family: inherit;
				transition: 0.12s;
				text-transform: capitalize;
			}

			#toolbar button.active {
				background: var(--clr-accent);
				color: var(--clr-bg);
				border-color: var(--clr-accent);
			}

			#toolbar button:hover:not(.active):not(:disabled) {
				background: var(--clr-accent-light);
				border-color: var(--clr-accent);
				color: var(--clr-accent);
			}

			#toolbar button:disabled {
				opacity: 0.4;
				cursor: default;
			}

			#main {
				display: flex;
				flex: 1;
				min-height: 0;
				overflow: hidden;
				background: var(--clr-bg);
			}

			#viewer-root {
				display: none;
			}

			#no-assignment {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--clr-muted);
				font-size: 14px;
			}

			#view-toggle {
				display: flex;
				gap: 2px;
			}
		</style>
	</head>
	<body>
		<div id="toolbar" class="app-toolbar">
			<span
				style="
					font-size: 11px;
					color: var(--clr-label);
					white-space: nowrap;
					margin-right: 4px;
				"
				>Assignment:</span
			>
			<div id="assignment-tabs" style="display: flex; gap: 4px"></div>
			<div class="sep"></div>
			<div id="view-toggle">
				<button id="btn-instructions" class="active">Instructions</button>
				<button id="btn-start">Starting Code</button>
			</div>
			<div class="sep"></div>
			<button id="submissions-btn" disabled>Show Submissions</button>
			<button id="lesson-btn" disabled>Open Lesson</button>
		</div>

		<div id="main">
			<div id="viewer-root"></div>
			<div id="no-assignment">Select an assignment</div>
		</div>

		<script src="preview.js"></script>
		<script src="diff-utils.js"></script>
		<script src="languages/profiles.js"></script>
		<script src="simulator-highlight.js"></script>
		<script src="file-viewer.js"></script>
		<script src="assignment-loader.js"></script>
		<script src="assignments.js"></script>
	</body>
</html>
