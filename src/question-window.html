<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Question</title>
		<link rel="stylesheet" href="./shared/styles.css" />
	</head>
	<body class="question-view">
		<div class="resize-handle resize-n" data-edge="top"></div>
		<div class="resize-handle resize-s" data-edge="bottom"></div>
		<div class="resize-handle resize-w" data-edge="left"></div>
		<div class="resize-handle resize-e" data-edge="right"></div>
		<div class="resize-handle resize-nw" data-edge="top-left"></div>
		<div class="resize-handle resize-ne" data-edge="top-right"></div>
		<div class="resize-handle resize-sw" data-edge="bottom-left"></div>
		<div class="resize-handle resize-se" data-edge="bottom-right"></div>
		<div class="neon-frame" id="neonFrame">
			<div class="question-emoji" id="questionEmoji">❓</div>
			<div class="question-text" id="questionText"></div>
			<div class="dots" id="dots">
				<div class="dot"></div>
				<div class="dot"></div>
				<div class="dot"></div>
			</div>
			<div class="student-banner" id="studentBanner"></div>
		</div>

		<script src="./shared/themes/theme-runtime.js"></script>
		<script src="./shared/themes/dragonball.js"></script>
		<script src="./shared/effects/effect-runtime.js"></script>
		<script src="./shared/effects/fireworks.js"></script>
		<script>
			const { ipcRenderer } = require("electron");

			let answerEffect = "fireworks";
			ipcRenderer.invoke("get-settings").then((s) => {
				if (s) {
					initBackground(s.floatingTheme);
					answerEffect = s.answerEffect || "fireworks";
					ipcRenderer.send("question-window-shape", getActiveShape());
				}
			});

			document.addEventListener("keydown", (e) => {
				if (e.key === "Escape") ipcRenderer.send("close-question-window");
				if (e.ctrlKey && (e.key === "i" || e.key === "I")) {
					e.preventDefault();
					ipcRenderer.send("open-question-devtools");
				}
			});

			document.querySelectorAll(".resize-handle").forEach((el) => {
				el.addEventListener("mousedown", (e) => {
					e.preventDefault();
					ipcRenderer.send("start-resizing", el.dataset.edge);
				});
			});
			window.addEventListener("mouseup", () =>
				ipcRenderer.send("end-resizing"),
			);

			ipcRenderer.on(
				"set-question",
				(event, { question, bgColor, emoji, studentName }) => {
					document.getElementById("studentBanner").style.display = "";
					document.getElementById("questionText").textContent = question;
					document.getElementById("questionEmoji").textContent =
						emoji || "❓";
					document.getElementById("dots").style.display = "flex";
					const banner = document.getElementById("studentBanner");
					if (studentName) {
						banner.textContent = studentName;
						banner.className = "student-banner visible";
					} else {
						banner.textContent = "";
						banner.className = "student-banner";
					}
					const solidColor =
						bgColor ||
						getComputedStyle(document.body)
							.getPropertyValue("--clr-question-bg")
							.trim();
					setBackgroundColor(solidColor);
				},
			);

			const AUTO_CLOSE_MS = 3000;
			const FADE_MS = 600;

			ipcRenderer.on("set-answered", (event, studentName) => {
				document.getElementById("dots").style.display = "none";
				const banner = document.getElementById("studentBanner");
				banner.style.display = "";
				banner.textContent = studentName
					? `Answered by ${studentName}`
					: "Answered";
				banner.className = "student-banner visible";
				playEffectSetting(answerEffect);
				setTimeout(() => {
					document.body.style.transition = `opacity ${FADE_MS}ms ease`;
					document.body.style.opacity = "0";
					setTimeout(() => window.close(), FADE_MS);
				}, AUTO_CLOSE_MS);
			});
		</script>
	</body>
</html>
