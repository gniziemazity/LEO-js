<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Move To</title>
		<link rel="stylesheet" href="./shared/styles.css" />
		<style>
			body.move-to-view {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100vh;
				margin: 0;
				background: #222;
				color: #fff;
				font-family: "Segoe UI", sans-serif;
			}
			.mt-frame {
				background: var(--clr-text);
				border-radius: 12px;
				padding: 24px 32px;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 16px;
				min-width: 360px;
				max-width: 720px;
			}
			.mt-emoji {
				font-size: 40px;
				line-height: 1;
			}
			.mt-title {
				font-size: 18px;
				font-weight: 700;
				text-align: center;
			}
			.mt-target {
				font-family: Consolas, "Courier New", monospace;
				font-size: 16px;
				font-weight: 700;
				background: rgba(255, 255, 255, 0.08);
				padding: 4px 10px;
				border-radius: 4px;
			}
			.mt-snippet {
				background: #1e1e1e;
				border: 1px solid rgba(255, 255, 255, 0.15);
				border-radius: 6px;
				padding: 10px 0;
				width: 100%;
				font-family: Consolas, "Courier New", monospace;
				font-size: 13px;
				line-height: 1.5;
				white-space: pre;
				overflow-x: auto;
			}
			.mt-line {
				display: flex;
				align-items: center;
				padding: 0 14px;
			}
			.mt-line.mt-line-target {
				background: rgba(241, 196, 15, 0.18);
				font-weight: 700;
			}
			.mt-arrow {
				display: inline-block;
				width: 20px;
				color: var(--clr-yellow);
				font-weight: 900;
				flex-shrink: 0;
			}
			.mt-line-text {
				flex: 1;
				color: #d4d4d4;
			}
			.mt-line.mt-line-target .mt-line-text {
				color: #fff;
			}
			.mt-empty {
				color: #888;
				font-style: italic;
				padding: 4px 14px;
			}
			.mt-confirm {
				margin-top: 4px;
				padding: 10px 28px;
				font-size: 15px;
				font-weight: 700;
				color: #fff;
				background: var(--clr-green);
				border: none;
				border-radius: 6px;
				cursor: pointer;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
			}
			.mt-confirm:hover {
				background: var(--clr-green);
			}
			.mt-confirm:active {
				transform: translateY(1px);
			}
		</style>
	</head>
	<body class="move-to-view">
		<div class="mt-frame">
			<div class="mt-emoji" id="mtEmoji">➡️</div>
			<div class="mt-title" id="mtTitle">Move to…</div>
			<div class="mt-target" id="mtTarget"></div>
			<div class="mt-snippet" id="mtSnippet" style="display: none"></div>
			<button class="mt-confirm" id="mtConfirm">✓ Confirm move</button>
		</div>
		<script>
			const { ipcRenderer } = require("electron");

			document.addEventListener("keydown", (e) => {
				if (e.key === "Escape" || e.key === "Enter") {
					confirmMove();
				}
			});

			document.getElementById("mtConfirm").addEventListener("click", () => {
				confirmMove();
			});

			function confirmMove() {
				ipcRenderer.send("confirm-move-to");
			}

			function escHtml(s) {
				return String(s)
					.replace(/&/g, "&amp;")
					.replace(/</g, "&lt;")
					.replace(/>/g, "&gt;");
			}

			ipcRenderer.on("set-move-to", (event, payload) => {
				const { mode, target, snippet } = payload;
				const emojiEl = document.getElementById("mtEmoji");
				const titleEl = document.getElementById("mtTitle");
				const targetEl = document.getElementById("mtTarget");
				const snippetEl = document.getElementById("mtSnippet");
				snippetEl.style.display = "none";
				snippetEl.innerHTML = "";

				if (mode === "dev") {
					emojiEl.textContent = "🛠️";
					titleEl.textContent = "Switch to Dev Tools";
					targetEl.textContent = "DEV";
				} else if (mode === "main") {
					emojiEl.textContent = "📝";
					titleEl.textContent = "Switch back to Main editor";
					targetEl.textContent = "MAIN";
				} else if (mode === "file") {
					emojiEl.textContent = "📄";
					titleEl.textContent = "Switch to file";
					targetEl.textContent = target;
				} else if (mode === "anchor") {
					emojiEl.textContent = "⚓";
					titleEl.textContent = "Move to anchor";
					targetEl.textContent = target;
					if (snippet && snippet.lines && snippet.lines.length) {
						snippetEl.style.display = "block";
						for (let i = 0; i < snippet.lines.length; i++) {
							const div = document.createElement("div");
							div.className = "mt-line";
							const isTarget = i === snippet.arrowIdx;
							if (isTarget) div.classList.add("mt-line-target");
							const arrow = document.createElement("span");
							arrow.className = "mt-arrow";
							arrow.textContent = isTarget ? "➤" : " ";
							const text = document.createElement("span");
							text.className = "mt-line-text";
							text.innerHTML = escHtml(snippet.lines[i] || " ");
							div.appendChild(arrow);
							div.appendChild(text);
							snippetEl.appendChild(div);
						}
					} else {
						snippetEl.style.display = "block";
						const div = document.createElement("div");
						div.className = "mt-empty";
						div.textContent =
							"(Anchor not found in plan — move to the matching position.)";
						snippetEl.appendChild(div);
					}
				} else {
					emojiEl.textContent = "➡️";
					titleEl.textContent = "Move to…";
					targetEl.textContent = target || "";
				}
			});
		</script>
	</body>
</html>
