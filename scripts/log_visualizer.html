<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>📋 Log Visualizer</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				height: 100%;
				width: 100%;
				overflow: hidden;
				font-family: "Segoe UI", sans-serif;
				font-size: 13px;
				background: #e8e8e8;
				color: #1e1e1e;
			}

			#vis-root {
				display: flex;
				height: 100vh;
				width: 100%;
			}

			#vis-left {
				display: flex;
				flex-direction: column;
				flex: 1 1 50%;
				min-width: 0;
				border-right: 2px solid #ccc;
			}

			#vis-right {
				display: flex;
				flex-direction: column;
				flex: 1 1 50%;
				min-width: 0;
				background: #f9f9f9;
			}

			#vis-toolbar {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 6px 10px;
				background: #e8e8e8;
				border-bottom: 1px solid #ccc;
				flex-shrink: 0;
				flex-wrap: wrap;
			}

			#vis-toolbar button {
				padding: 4px 12px;
				border: none;
				border-radius: 3px;
				cursor: pointer;
				font-size: 12px;
				color: #fff;
			}

			#btn-play {
				background: #2d8f2d;
			}
			#btn-reset {
				background: #7a6500;
			}
			#btn-open-toolbar {
				background: #555;
			}
			#btn-settings {
				background: #f0f0f8;
				color: #0000ff !important;
			}

			#vis-toolbar label {
				font-size: 12px;
				color: #888;
				display: flex;
				align-items: center;
				gap: 4px;
			}
			#speed-slider {
				width: 120px;
			}
			#speed-label {
				font-size: 12px;
				font-weight: bold;
				color: #007acc;
				min-width: 32px;
			}

			.sep {
				width: 1px;
				height: 18px;
				background: #bbb;
				margin: 0 4px;
			}

			#vis-seekbar {
				height: 10px;
				background: #f3f3f3;
				cursor: pointer;
				flex-shrink: 0;
				position: relative;
				border-bottom: 1px solid #ddd;
			}
			#vis-seekfill {
				height: 100%;
				background: #007acc;
				width: 0%;
				pointer-events: none;
			}

			#vis-main {
				display: flex;
				flex: 1 1 0;
				min-height: 0;
				overflow: hidden;
			}

			#vis-editor-wrap {
				display: flex;
				flex-direction: column;
				flex: 1 1 0;
				min-width: 0;
				overflow: hidden;
				position: relative;
			}

			pre#vis-editor {
				flex: 1 1 0;
				overflow: auto;
				background: #ffffff;
				color: #1e1e1e;
				font-family: Consolas, "Courier New", monospace;
				font-size: 12px;
				line-height: 1.5;
				padding: 6px 8px;
				white-space: pre-wrap;
				word-break: break-all;
				min-height: 0;
			}

			#vis-dev-outer {
				position: absolute;
				bottom: 22px;
				right: 10px;
				width: 52%;
				height: 38%;
				background: #f5f5f5;
				border: 1px solid #007acc;
				display: flex;
				flex-direction: column;
				z-index: 5;
			}
			#vis-dev-outer.collapsed {
				height: auto;
			}
			#vis-dev-outer.collapsed pre#vis-dev-editor {
				display: none;
			}

			#vis-dev-title {
				display: flex;
				align-items: center;
				background: #ddeeff;
				padding: 2px 6px;
				font-family: Consolas, monospace;
				font-size: 11px;
				font-weight: bold;
				color: #007acc;
				gap: 4px;
			}
			#dev-indicator {
				margin-left: auto;
			}
			#btn-dev-toggle {
				border: none;
				background: transparent;
				cursor: pointer;
				font-size: 13px;
				font-weight: bold;
				color: #007acc;
				padding: 0 4px;
			}

			pre#vis-dev-editor {
				flex: 1 1 0;
				overflow: auto;
				background: #f5f5f5;
				color: #009900;
				font-family: Consolas, "Courier New", monospace;
				font-size: 11px;
				line-height: 1.5;
				padding: 4px 6px;
				white-space: pre-wrap;
				word-break: break-all;
			}

			#vis-event-log-wrap {
				width: 260px;
				flex-shrink: 0;
				display: flex;
				flex-direction: column;
				border-left: 1px solid #ddd;
				background: #f3f3f3;
				overflow: hidden;
			}

			#vis-event-log {
				flex: 1 1 0;
				overflow-y: auto;
				font-family: Consolas, monospace;
				font-size: 10px;
				padding: 4px 6px;
				white-space: pre-wrap;
				word-break: break-all;
				color: #007acc;
			}

			#vis-status {
				background: #007acc;
				color: #fff;
				padding: 3px 8px;
				font-size: 12px;
				flex-shrink: 0;
			}

			#vis-right {
				display: flex;
				flex-direction: column;
			}

			#vis-preview {
				flex: 1 1 0;
				border: none;
				background: #fff;
			}

			#btn-refresh-preview {
				padding: 1px 6px;
				font-size: 14px;
				border: 1px solid #ccc;
				border-radius: 3px;
				cursor: pointer;
				background: #fff;
				color: #333;
			}
			#btn-refresh-preview:hover {
				background: #e8e8e8;
			}

			.pane-title {
				background: #f3f3f3;
				border-bottom: 1px solid #ddd;
				padding: 3px 8px;
				font-size: 12px;
				font-weight: bold;
				color: #1e1e1e;
				flex-shrink: 0;
			}

			#vis-file-tabs {
				display: flex;
				flex-wrap: wrap;
				background: #e8e8e8;
				border-bottom: 1px solid #ccc;
				flex-shrink: 0;
			}
			#vis-file-tabs:empty {
				display: none;
			}
			.file-tab {
				padding: 3px 14px;
				border: none;
				border-right: 1px solid #ccc;
				background: #f3f3f3;
				color: #888;
				font-size: 11px;
				font-family: Consolas, monospace;
				cursor: pointer;
				white-space: nowrap;
			}
			.file-tab:hover {
				background: #e0e0e0;
				color: #333;
			}
			.file-tab-active {
				background: #ffffff;
				color: #1e1e1e;
				font-weight: bold;
				border-bottom: 2px solid #007acc;
			}

			@keyframes anchor-flash {
				0% {
					outline: 2px solid #007acc;
				}
				60% {
					outline: 2px solid #007acc;
				}
				100% {
					outline: 2px solid transparent;
				}
			}
			pre#vis-editor.anchor-flash .vis-cursor {
				background: #007acc;
				animation: none;
			}

			.vis-cursor {
				display: inline-block;
				width: 1px;
				background: #000;
				color: transparent;
				font-size: 0;
				vertical-align: text-bottom;
				height: 1.2em;
				animation: blink 1s step-end infinite;
			}
			@keyframes blink {
				50% {
					background: transparent;
				}
			}

			#settings-modal {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.4);
				z-index: 100;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#settings-box {
				background: #f0f0f8;
				border-radius: 6px;
				padding: 20px 24px;
				min-width: 460px;
				max-height: 80vh;
				overflow-y: auto;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
			}
			#settings-box table {
				border-collapse: collapse;
				width: 100%;
			}
			#settings-box td {
				padding: 3px 6px;
				font-size: 12px;
			}
			#btn-close-settings {
				padding: 5px 18px;
				background: #007acc;
				color: #fff;
				border: none;
				border-radius: 3px;
				cursor: pointer;
				font-size: 12px;
			}

			#vis-hover-tip {
				position: fixed;
				display: none;
				background: #1e1e1e;
				color: #d4d4d4;
				font-family: Consolas, monospace;
				font-size: 11px;
				padding: 3px 7px;
				border-radius: 3px;
				pointer-events: none;
				z-index: 200;
				white-space: nowrap;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
			}

			#lv-landing {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #e8e8e8;
				z-index: 500;
			}
			#lv-landing-box {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 18px;
			}
			#lv-landing-title {
				font-size: 22px;
				font-weight: bold;
				color: #1e1e1e;
			}
			#btn-open-log {
				padding: 10px 32px;
				font-size: 14px;
				background: #007acc;
				color: #fff;
				border: none;
				border-radius: 4px;
				cursor: pointer;
			}
			#btn-open-log:hover {
				background: #005a9e;
			}
			#btn-open-log:disabled {
				background: #999;
				cursor: default;
			}
			#lv-landing-hint {
				font-size: 12px;
				color: #888;
			}
		</style>
	</head>
	<body>
		<div id="lv-landing">
			<div id="lv-landing-box">
				<div id="lv-landing-title">📋 Log Visualizer</div>
				<button id="btn-open-log">📄 Open Log File</button>
				<div id="lv-landing-hint">
					or wait for LEO to open a log automatically
				</div>
			</div>
		</div>
		<input
			type="file"
			id="lv-file-input"
			accept=".json"
			style="display: none"
		/>
		<div id="vis-root"></div>
		<script>
			// populated by LEO (main.js writes .last_vis_data.js before opening this page).
			window.__LOG_DATA__ = null;
		</script>
		<script src=".last_vis_data.js" onerror="void 0"></script>
		<script src="log_visualizer.js"></script>
	</body>
</html>
